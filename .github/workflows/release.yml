name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = "${{ github.event.inputs.version }}"
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
          $installer_ver = $ver -replace '-.*$', ''
          echo "INSTALLER_VERSION=$installer_ver" >> $env:GITHUB_OUTPUT

      - name: Build fat JAR
        run: mvn package -DskipTests -Drevision=${{ steps.version.outputs.APP_VERSION }}

      - name: Create Windows installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.APP_VERSION }}"
          jpackage `
            --input target `
            --dest target/installer `
            --name "TheTowerAnalyzer" `
            --main-jar the-tower-analyzer.jar `
            --type exe `
            --app-version "${{ steps.version.outputs.INSTALLER_VERSION }}" `
            --description "The Tower Analyzer" `
            --vendor "Draukadin" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-console `
            --icon src/main/resources/app.ico `
            --java-options "-Djava.awt.headless=true"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}-installer
          path: target/installer/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TheTowerAnalyzer ${{ steps.version.outputs.APP_VERSION }}
          body: |
            ## Installation

            1. Download and run `TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}.exe`
            2. On first launch, a `user.properties` file will be created at `%APPDATA%\TheTowerAnalyzer\`
            3. Fill in your Google Drive folder IDs, Sheets IDs, and place your credential files there
            4. Relaunch the app — it will start a local server at http://localhost:8080

            ### Required files in `%APPDATA%\TheTowerAnalyzer\`
            - `user.properties` (auto-created on first run, fill in the placeholders)
            - `oauth-credentials.json` (OAuth 2.0 client secret — used for both Drive and Sheets)
          files: target/installer/*.exe
          generate_release_notes: true
