name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
        default: '1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = "${{ github.event.inputs.version }}"
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
          $installer_ver = $ver -replace '-.*$', ''
          echo "INSTALLER_VERSION=$installer_ver" >> $env:GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build fat JAR
        run: mvn package -DskipTests "-Drevision=${{ steps.version.outputs.APP_VERSION }}"

      - name: Install MCP dependencies
        run: npm install --omit=dev --prefix mcp

      - name: Stage MCP bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force target/mcp-bundle/mcp
          Copy-Item mcp/server.js, mcp/package.json -Destination target/mcp-bundle/mcp/
          Copy-Item mcp/node_modules -Destination target/mcp-bundle/mcp/node_modules -Recurse
          Copy-Item (Get-Command node).Source -Destination target/mcp-bundle/mcp/node.exe

      - name: Create Windows installer
        shell: pwsh
        run: |
          jpackage `
            --input target `
            --dest target/installer `
            --name "TheTowerAnalyzer" `
            --main-jar the-tower-analyzer.jar `
            --type exe `
            --app-version "${{ steps.version.outputs.INSTALLER_VERSION }}" `
            --description "The Tower Analyzer" `
            --vendor "Draukadin" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --win-console `
            --icon src/main/resources/app.ico `
            --java-options "-Djava.awt.headless=true" `
            --win-upgrade-uuid "7E046B11-0100-4D69-BAFE-442CBD5779CB" `
            --app-content target/mcp-bundle/mcp

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}-windows
          path: target/installer/*.exe

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${{ github.ref_name }}"
            ver="${ver#v}"
          else
            ver="${{ github.event.inputs.version }}"
          fi
          echo "APP_VERSION=$ver" >> $GITHUB_OUTPUT
          installer_ver="${ver%%-*}"
          echo "INSTALLER_VERSION=$installer_ver" >> $GITHUB_OUTPUT

      - name: Build fat JAR
        run: mvn package -DskipTests "-Drevision=${{ steps.version.outputs.APP_VERSION }}"

      - name: Create Mac installer
        run: |
          jpackage \
            --input target \
            --dest target/installer \
            --name "TheTowerAnalyzer" \
            --main-jar the-tower-analyzer.jar \
            --type dmg \
            --app-version "${{ steps.version.outputs.INSTALLER_VERSION }}" \
            --description "The Tower Analyzer" \
            --vendor "Draukadin" \
            --icon src/main/resources/app.icns \
            --java-options "-Djava.awt.headless=true"

      - name: Upload Mac installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}-mac
          path: target/installer/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: version
        run: |
          ver="${{ github.ref_name }}"
          echo "APP_VERSION=${ver#v}" >> $GITHUB_OUTPUT

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}-windows
          path: installers

      - name: Download Mac installer
        uses: actions/download-artifact@v4
        with:
          name: TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}-mac
          path: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TheTowerAnalyzer ${{ steps.version.outputs.APP_VERSION }}
          body: |
            ## Installation

            - **Windows:** Download and run `TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}.exe`
            - **Mac:** Download and open `TheTowerAnalyzer-${{ steps.version.outputs.APP_VERSION }}.dmg`

            > **Mac users:** If Gatekeeper blocks the app, right-click the app and choose **Open** to bypass the warning.

            The app will open your browser automatically to `http://localhost:8080`

            On first launch a setup wizard will guide you through connecting your submission method (Android app or iOS Shortcut) and entering your Player ID.

            See the [Setup Guide](https://github.com/draukadin/TheTowerAnlyzer/blob/master/resources/Centralized_Setup_Guide.md) for step-by-step instructions.
          files: installers/*
          generate_release_notes: true
