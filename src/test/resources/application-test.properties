# Disable the hard import of user.properties (file does not exist in test environment)
spring.config.import=

# Use a fresh SQLite file per test run; DatabaseInitializer creates the full schema at startup
spring.datasource.url=jdbc:sqlite:${java.io.tmpdir}/tower-test-${random.int}.db

# Disable Spring cache to prevent cross-test contamination
spring.cache.type=none

# Stub drive properties so ReportFetcherService doesn't throw on blank folderId
drive.battle-reports-folder-id=test-folder-id
drive.application-name=test

# Stub cell-income window so AppConfig binding doesn't fail
tower.cells.window-days-default=30
tower.cells.window-days-min=3
tower.cells.window-days-max=90

# Blank out AWS props so AwsProperties.isConfigured() returns false in tests
aws.region=
aws.s3-bucket=
aws.player-id=