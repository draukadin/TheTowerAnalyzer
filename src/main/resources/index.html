<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tower Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  :root {
    --bg:#0d0f14; --surface:#141720; --surface2:#1c2030;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8eaf0; --muted:#7a8099;
    --accent:#4f8ef7; --accent2:#7c5cfc;
    --gold:#f5c842; --green:#3dd68c; --red:#f26b6b; --orange:#f59e42;
    --font:'Segoe UI',system-ui,sans-serif;
    --mono:'Consolas','Courier New',monospace;
    --radius:10px; --radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;
    border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.5px;}
  .logo-text span{color:var(--accent);}
  .header-nav{display:flex;gap:6px;}
  .nav-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;
    color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
  .nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,0.08);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;}
  .status-dot.err{background:var(--red);}
  .layout{display:flex;height:calc(100vh - 57px);}
  .sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:12px 1rem;border-bottom:1px solid var(--border);display:flex;
    align-items:center;justify-content:space-between;}
  .sidebar-header h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .folder-filter{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;
    color:var(--text);font-size:12px;padding:4px 8px;font-family:var(--font);}
  .report-list{overflow-y:auto;flex:1;}
  .report-item{padding:11px 1rem;border-bottom:1px solid var(--border);cursor:pointer;
    transition:background 0.12s;display:flex;flex-direction:column;gap:3px;}
  .report-item:hover{background:var(--surface2);}
  .report-item.active{background:rgba(79,142,247,0.1);border-left:3px solid var(--accent);
    padding-left:calc(1rem - 3px);}
  .report-item-name{font-size:13px;font-weight:600;}
  .report-item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
  .tier-badge{background:rgba(79,142,247,0.15);color:var(--accent);padding:1px 6px;
    border-radius:4px;font-size:10px;font-weight:700;}
  .era-badge{background:rgba(124,92,252,0.15);color:var(--accent2);padding:1px 6px;
    border-radius:4px;font-size:10px;font-weight:600;max-width:120px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wave-badge{color:var(--gold);}
  .loading-placeholder{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
  .main{flex:1;overflow-y:auto;padding:2rem;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--muted);gap:12px;text-align:center;}
  .empty-state .icon{font-size:48px;opacity:0.3;}
  .empty-state h2{font-size:1.2rem;color:var(--text);opacity:0.6;}
  .empty-state p{font-size:14px;max-width:320px;line-height:1.6;}
  .tab-bar{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .tab{padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .report-header{margin-bottom:1.5rem;}
  .report-title{font-size:1.4rem;font-weight:700;margin-bottom:6px;}
  .report-subtitle{color:var(--muted);font-size:13px;display:flex;gap:16px;flex-wrap:wrap;}
  .killed-by{display:inline-flex;align-items:center;background:rgba(242,107,107,0.12);
    color:var(--red);border:1px solid rgba(242,107,107,0.25);border-radius:6px;
    padding:3px 9px;font-size:12px;font-weight:600;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin:1.75rem 0 0.875rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;}
  .stat-card .label{font-size:11px;color:var(--muted);margin-bottom:5px;}
  .stat-card .value{font-size:1.2rem;font-weight:700;font-family:var(--mono);}
  .stat-card .value.gold{color:var(--gold);}  .stat-card .value.green{color:var(--green);}
  .stat-card .value.accent{color:var(--accent);} .stat-card .value.red{color:var(--red);}
  .stat-card .value.orange{color:var(--orange);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .table-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .table-section table{width:100%;border-collapse:collapse;font-size:13px;}
  .table-section th{background:var(--surface2);padding:9px 13px;text-align:left;
    font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;}
  .table-section td{padding:9px 13px;border-top:1px solid var(--border);}
  .table-section tr:hover td{background:var(--surface2);}
  .val-num{font-family:var(--mono);color:var(--accent);font-weight:600;text-align:right;}
  .val-pct{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;}
  .bar-row{display:flex;align-items:center;}
  .bar-fill{height:5px;border-radius:3px;background:var(--accent);min-width:2px;}
  .bar-fill.gold{background:var(--gold);} .bar-fill.green{background:var(--green);}
  .bar-fill.orange{background:var(--orange);} .bar-fill.red{background:var(--red);}
  .diag-card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;}
  .diag-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
  .diag-badge{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;}
  .diag-badge.HIGH{background:rgba(61,214,140,0.15);color:var(--green);border:1px solid rgba(61,214,140,0.3);}
  .diag-badge.MEDIUM{background:rgba(245,158,66,0.15);color:var(--orange);border:1px solid rgba(245,158,66,0.3);}
  .diag-badge.LOW{background:rgba(122,128,153,0.15);color:var(--muted);border:1px solid var(--border2);}
  .diag-title{font-size:1.1rem;font-weight:700;}
  .diag-explanation{font-size:13px;line-height:1.7;color:var(--muted);}
  .diag-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:1rem;}
  .diag-metric{background:var(--surface2);border-radius:8px;padding:10px 12px;}
  .diag-metric .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .diag-metric .value{font-size:1rem;font-weight:700;font-family:var(--mono);color:var(--text);}
  .obs-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .obs-item{background:var(--surface2);border-radius:8px;padding:10px 14px;}
  .obs-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:3px;}
  .obs-detail{font-size:12px;color:var(--muted);line-height:1.6;}
  .lab-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem;}
  .lab-slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
  .lab-slot-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .lab-slot-max{font-size:1.3rem;font-weight:700;font-family:var(--mono);color:var(--green);margin-bottom:4px;}
  .lab-slot-max.none{color:var(--red);}
  .speed-row{display:flex;align-items:center;justify-content:space-between;
    font-size:11px;padding:3px 0;border-top:1px solid var(--border);}
  .speed-row .spd{font-weight:600;font-family:var(--mono);}
  .speed-row .cost{color:var(--muted);}
  .speed-row.affordable .spd{color:var(--green);}
  .speed-row.unaffordable .spd{color:var(--red);opacity:0.5;}
  .window-controls{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
  .window-controls label{font-size:13px;color:var(--muted);}
  .window-controls input[type=range]{accent-color:var(--accent);}
  .window-controls span{font-size:13px;font-weight:600;color:var(--accent);min-width:50px;}
  .trend-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);
    border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
  .trend-table th{background:var(--surface2);padding:9px 13px;text-align:left;
    font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .trend-table td{padding:9px 13px;border-top:1px solid var(--border);}
  .trend-table tr:hover td{background:var(--surface2);}
  .optimal-card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
  .optimal-slots{display:flex;gap:8px;flex-wrap:wrap;margin:0.75rem 0;}
  .optimal-slot-badge{background:rgba(61,214,140,0.12);color:var(--green);
    border:1px solid rgba(61,214,140,0.25);border-radius:6px;padding:4px 10px;
    font-size:13px;font-weight:700;font-family:var(--mono);}
  .optimal-slot-badge.none{background:rgba(122,128,153,0.1);color:var(--muted);border-color:var(--border2);}
  .compare-controls{display:flex;gap:10px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;}
  .compare-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    color:var(--text);font-size:13px;padding:7px 10px;font-family:var(--font);min-width:220px;}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);
    color:var(--text);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-primary:hover{background:#3a7de8;color:#fff;}
  .delta-pos{color:var(--green);font-family:var(--mono);font-size:13px;}
  .delta-neg{color:var(--red);font-family:var(--mono);font-size:13px;}
  .delta-neu{color:var(--muted);font-family:var(--mono);font-size:13px;}
  .gemini-chat{margin-top:2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
  .gemini-chat-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .gemini-context-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
  .gemini-context-options{margin-bottom:1rem;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .gemini-context-option{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;}
  .gemini-context-option input[type=checkbox]{accent-color:var(--accent);cursor:pointer;}
  .gemini-input-row{display:flex;gap:10px;align-items:flex-end;}
  .gemini-textarea{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    color:var(--text);font-size:13px;padding:10px 12px;font-family:var(--font);resize:vertical;
    min-height:72px;line-height:1.5;}
  .gemini-textarea:focus{outline:none;border-color:var(--accent);}
  .chat-thread{display:flex;flex-direction:column;gap:10px;margin-top:1rem;}
  .chat-turn{padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.7;}
  .chat-turn.user{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);}
  .chat-turn.model{background:var(--surface2);border:1px solid var(--border);}
  .chat-turn.model p{margin:0 0 .6em;}
  .chat-turn.model p:last-child{margin-bottom:0;}
  .chat-turn.model ul,.chat-turn.model ol{padding-left:1.4em;margin:.4em 0;}
  .chat-turn.model li{margin:.2em 0;}
  .chat-turn.model h1,.chat-turn.model h2,.chat-turn.model h3{font-size:1em;font-weight:700;margin:.8em 0 .3em;color:var(--accent);}
  .chat-turn.model code{background:rgba(0,0,0,0.3);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em;}
  .chat-turn.model pre{background:rgba(0,0,0,0.3);border-radius:6px;padding:.75em 1em;overflow-x:auto;margin:.5em 0;}
  .chat-turn.model pre code{background:none;padding:0;}
  .chat-turn.model strong{color:var(--text);font-weight:700;}
  .chat-turn.model hr{border:none;border-top:1px solid var(--border);margin:.8em 0;}
  .chat-turn-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:520px;max-width:92vw;max-height:82vh;overflow-y:auto;}
  .modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;}
  .form-group{margin-bottom:1.25rem;}
  .form-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;display:block;}
  .form-input,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:9px 12px;font-family:var(--font);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .sidebar-actions{padding:8px 1rem;border-bottom:1px solid var(--border);}
  .btn-fetch{width:100%;padding:7px 12px;border-radius:7px;border:1px solid var(--border2);
    background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;
    transition:all 0.15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-fetch:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .btn-fetch:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-fetch.loading{color:var(--muted);}

  /* ── UW Tracker ──────────────────────────────── */
  .uw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;}
  .uw-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    overflow:hidden;}
  .uw-card-header{display:flex;align-items:center;gap:10px;padding:9px 13px;
    background:var(--surface2);border-bottom:1px solid var(--border);}
  .uw-name{font-size:13px;font-weight:700;flex:1;}
  .uw-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);
    cursor:pointer;user-select:none;white-space:nowrap;}
  .uw-toggle input{accent-color:var(--green);cursor:pointer;}
  .uw-toggle input:disabled{cursor:not-allowed;}
  .uw-stats-table{width:100%;border-collapse:collapse;font-size:12px;}
  .uw-stats-table th{background:var(--surface2);padding:5px 10px;text-align:left;
    font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600;}
  .uw-stats-table th:last-child,.uw-stats-table th:nth-child(3),.uw-stats-table th:nth-child(4){text-align:right;}
  .uw-stats-table td{padding:6px 10px;border-top:1px solid var(--border);}
  .uw-stats-table tr.uw-plus-row td{border-top:2px solid var(--border2);}
  .uw-val{font-family:var(--mono);color:var(--accent);font-weight:600;min-width:70px;}
  .uw-stones{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;}
  .uw-lvl-cell{text-align:right;}
  .uw-level-select{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;
    color:var(--text);font-size:11px;padding:2px 5px;font-family:var(--mono);cursor:pointer;width:52px;}
  .uw-level-select:disabled{opacity:0.4;cursor:not-allowed;}
  .uw-row-locked td{opacity:0.38;}
  .uw-stones-total{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .uw-stones-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:8px 14px;font-size:12px;}
  .uw-stones-chip .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;
    color:var(--muted);margin-bottom:3px;}
  .uw-stones-chip .val{font-family:var(--mono);font-weight:700;color:var(--gold);}

  /* ── Module Tracker ──────────────────────────────── */
  .mod-type-section{margin-bottom:2rem;}
  .mod-type-header{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin-bottom:0.75rem;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .mod-type-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
  .mod-type-badge.Cannon{background:rgba(245,158,66,0.15);color:var(--orange);}
  .mod-type-badge.Generator{background:rgba(61,214,140,0.15);color:var(--green);}
  .mod-type-badge.Armor{background:rgba(79,142,247,0.15);color:var(--accent);}
  .mod-type-badge.Core{background:rgba(124,92,252,0.15);color:var(--accent2);}
  .mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;}
  .mod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .mod-card.owned{border-color:rgba(255,255,255,0.18);}
  .mod-card-header{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .mod-code{font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.07);}
  .mod-name{font-size:13px;font-weight:700;flex:1;}
  .mod-equipped-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
  .mod-equipped-badge.primary{background:rgba(61,214,140,0.15);color:var(--green);}
  .mod-equipped-badge.assist{background:rgba(79,142,247,0.15);color:var(--accent);}
  .mod-body{padding:11px 13px;display:flex;flex-direction:column;gap:10px;}
  .mod-effect{font-size:12px;color:var(--muted);line-height:1.55;font-style:italic;}
  .mod-ability-row{display:flex;gap:6px;flex-wrap:wrap;}
  .mod-ability-chip{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--text);}
  .mod-ability-chip.current{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,0.1);}
  .mod-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .mod-select{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;
    color:var(--text);font-size:12px;padding:3px 6px;font-family:var(--font);cursor:pointer;}
  .mod-input{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;
    color:var(--text);font-size:12px;padding:3px 6px;font-family:var(--mono);width:60px;}
  .mod-label{font-size:11px;color:var(--muted);}
  .mod-substats{border-top:1px solid var(--border);padding-top:8px;}
  .mod-substats-title{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;}
  .mod-substat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .mod-slot-num{font-size:10px;color:var(--muted);font-family:var(--mono);width:14px;text-align:right;flex-shrink:0;}
  .mod-substat-rarity{font-size:10px;font-weight:700;font-family:var(--mono);padding:1px 5px;
    border-radius:3px;flex-shrink:0;min-width:64px;text-align:center;}
  .mod-substat-rarity.Common{background:rgba(122,128,153,0.15);color:var(--muted);}
  .mod-substat-rarity.Rare{background:rgba(79,142,247,0.15);color:var(--accent);}
  .mod-substat-rarity.Epic{background:rgba(124,92,252,0.15);color:var(--accent2);}
  .mod-substat-rarity.Legendary{background:rgba(245,158,66,0.15);color:var(--orange);}
  .mod-substat-rarity.Mythic{background:rgba(61,214,140,0.15);color:var(--green);}
  .mod-substat-rarity.Ancestral{background:rgba(245,200,66,0.2);color:var(--gold);}
  .mod-lock-btn{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid var(--border2);
    background:transparent;color:var(--muted);cursor:pointer;flex-shrink:0;}
  .mod-lock-btn.locked{border-color:var(--gold);color:var(--gold);}
  .mod-copies{border-top:1px solid var(--border);padding-top:8px;}
  .mod-copies-title{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;}
  .mod-copies-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .mod-copy-chip{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;
    border:1px solid var(--border2);cursor:pointer;transition:all 0.12s;}
  .mod-copy-chip:hover{border-color:var(--red);color:var(--red);}
  .mod-copy-chip.Epic{border-color:rgba(124,92,252,0.5);color:var(--accent2);}
  .mod-copy-chip.Legendary{border-color:rgba(245,158,66,0.5);color:var(--orange);}
  .mod-copy-chip.Mythic{border-color:rgba(61,214,140,0.5);color:var(--green);}
  .mod-add-copy{font-size:11px;padding:2px 8px;border-radius:4px;border:1px dashed var(--border2);
    background:transparent;color:var(--muted);cursor:pointer;}
  .mod-add-copy:hover{border-color:var(--accent);color:var(--accent);}
  .mod-footer{display:flex;gap:12px;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap;}
  .mod-presets{border-top:1px solid var(--border);padding-top:8px;}
  .mod-presets-title{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px;}
  .mod-preset-chips{display:flex;gap:5px;flex-wrap:wrap;}
  .mod-preset-chip{font-size:11px;padding:2px 9px;border-radius:4px;border:1px solid var(--border2);
    cursor:pointer;transition:all 0.12s;color:var(--muted);user-select:none;}
  .mod-preset-chip.active.Farming{background:rgba(61,214,140,0.15);border-color:rgba(61,214,140,0.5);color:var(--green);}
  .mod-preset-chip.active.Tournament{background:rgba(79,142,247,0.15);border-color:rgba(79,142,247,0.5);color:var(--accent);}
  .mod-preset-chip.active.Testing{background:rgba(245,158,66,0.15);border-color:rgba(245,158,66,0.5);color:var(--orange);}
  .mod-preset-chip.taken{opacity:0.3;cursor:not-allowed;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🗼</div>
    <div class="logo-text">The Tower <span>Analyzer</span></div>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showView('reports')">Reports</button>
    <button class="nav-btn" onclick="showView('cells')">Cell Income</button>
    <button class="nav-btn" onclick="showView('labspeed')">Lab Speed</button>
    <button class="nav-btn" onclick="showView('shards')">Shard Rate</button>
    <button class="nav-btn" onclick="showView('uw')">UW Tracker</button>
    <button class="nav-btn" onclick="showView('modules')">Modules</button>
    <button class="nav-btn" onclick="openProfileModal()">&#9881; Profile</button>
    <button class="nav-btn" id="exportContextBtn" onclick="exportContext()">&#8659; Export Context</button>
  </div>
  <div style="font-size:12px;color:var(--muted)">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Battle Reports</h2>
      <select class="folder-filter" id="folderFilter" onchange="filterFolder(this.value)">
        <option value="">All folders</option>
      </select>
    </div>
    <div class="sidebar-actions">
      <button class="btn-fetch" id="fetchBtn" onclick="fetchReports()">&#8595; Fetch New Reports</button>
    </div>
    <div class="report-list" id="reportList">
      <div class="loading-placeholder">Loading reports…</div>
    </div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="icon">🗼</div>
      <h2>Select a report</h2>
      <p>Choose a battle report from the sidebar to see detailed stats, diagnosis, and comparisons.</p>
    </div>
  </main>
</div>
<script>
const API='http://localhost:8080/api';
let allReports=[],activeId=null,activePayload=null,activeView='reports',currentTab='stats';
let chatState={id1:null,id2:null,history:[],provider:'gemini'};

async function init(){
  try{
    const res=await fetch(`${API}/reports`);
    if(!res.ok)throw new Error(res.statusText);
    allReports=await res.json();
    setStatus(true,`${allReports.length} reports loaded`);
    populateFolderFilter();
    renderSidebar(allReports);
  }catch(e){
    setStatus(false,'Cannot reach server');
    document.getElementById('reportList').innerHTML=
      '<div class="loading-placeholder" style="color:var(--red)">Server offline — is Spring Boot running on :8080?</div>';
  }
}

async function fetchReports(){
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;
  btn.classList.add('loading');
  btn.textContent='Fetching…';
  try{
    const res=await fetch(`${API}/reports/fetch`,{method:'POST'});
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    const n=data.processed;
    btn.textContent=n>0?`↓ Fetched ${n} report${n===1?'':'s'}`:'No new reports';
    if(n>0){
      const res2=await fetch(`${API}/reports`);
      allReports=await res2.json();
      populateFolderFilter();
      renderSidebar(visibleReports());
      setStatus(true,`${allReports.length} reports loaded`);
    }
  }catch(e){
    btn.textContent='Fetch failed';
    setStatus(false,'Fetch error');
  }finally{
    btn.disabled=false;
    btn.classList.remove('loading');
    setTimeout(()=>{btn.textContent='↓ Fetch New Reports';},3000);
  }
}

function setStatus(ok,msg){
  document.getElementById('statusDot').className='status-dot'+(ok?'':' err');
  document.getElementById('statusText').textContent=msg;
}

function populateFolderFilter(){
  const folders=[...new Set(allReports.map(r=>r.runType))].sort();
  const sel=document.getElementById('folderFilter');
  folders.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o);});
}

function filterFolder(folder){
  renderSidebar(folder?allReports.filter(r=>r.runType===folder):allReports);
}

function visibleReports(){
  const f=document.getElementById('folderFilter').value;
  return f?allReports.filter(r=>r.runType===f):allReports;
}

function renderSidebar(reports){
  const list=document.getElementById('reportList');
  list.innerHTML='';
  if(!reports.length){list.innerHTML='<div class="loading-placeholder">No reports found</div>';return;}
  reports.forEach(r=>{
    const item=document.createElement('div');
    item.className='report-item'+(r.id===activeId?' active':'');
    item.innerHTML=`
      <div class="report-item-name">T${r.tier}_Wave${r.wave.toLocaleString()}</div>
      <div class="report-item-meta">
        <span class="tier-badge">T${r.tier}</span>
        <span class="wave-badge">⚡ ${r.wave.toLocaleString()}</span>
        ${r.towerEra?`<span class="era-badge" title="${r.towerEra}">${r.towerEra}</span>`:''}
      </div>
      <div class="report-item-meta">
        <span>📅 ${r.battleDate}</span>
        <span style="color:var(--red);font-size:10px">💀 ${r.killedBy||'?'}</span>
      </div>`;
    item.addEventListener('click',()=>selectReport(r));
    list.appendChild(item);
  });
}

async function selectReport(summary){
  activeId=summary.id; currentTab='stats';
  renderSidebar(visibleReports());
  document.getElementById('mainContent').innerHTML=
    '<div class="loading-placeholder" style="padding:4rem;text-align:center">Loading…</div>';
  try{
    const res=await fetch(`${API}/reports/${encodeURIComponent(summary.id)}`);
    if(!res.ok)throw new Error(res.statusText);
    activePayload=await res.json();
    renderReportView(summary,activePayload);
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Failed to load</h2><p>${e.message}</p></div>`;
  }
}

function showView(view){
  activeView=view;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['reports','cells','labspeed','shards','uw','modules'][i]===view);
  });
  if(view==='cells')renderCellsView();
  else if(view==='labspeed')renderLabSpeedView();
  else if(view==='shards')renderShardsView();
  else if(view==='uw')renderUwView();
  else if(view==='modules')renderModulesView();
  else if(activeId&&activePayload)renderReportView(allReports.find(r=>r.id===activeId),activePayload);
  else document.getElementById('mainContent').innerHTML=`
    <div class="empty-state"><div class="icon">🗼</div><h2>Select a report</h2>
    <p>Choose a battle report from the sidebar.</p></div>`;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const summary=allReports.find(r=>r.id===activeId);
  if(tab==='stats')renderStatsPanel(summary,activePayload);
  else if(tab==='diagnosis')renderDiagnosisPanel(summary);
  else if(tab==='compare')renderComparePanel(summary);
}

function renderReportView(summary,payload){
  document.getElementById('mainContent').innerHTML=`
    <div class="report-header">
      <div class="report-title">${summary.runType} — T${summary.tier} Wave ${summary.wave.toLocaleString()}</div>
      <div class="report-subtitle">
        <span>📅 ${summary.battleDate}</span>
        <span>${fmtDuration(summary.realTimeSeconds)} real · ${fmtDuration(summary.gameTimeSeconds)} game</span>
        ${summary.towerEra?`<span>🏗️ ${summary.towerEra}</span>`:''}
        <span><span class="killed-by">💀 ${summary.killedBy||'Unknown'}</span></span>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active" data-tab="stats" onclick="switchTab('stats')">Stats</div>
      <div class="tab" data-tab="diagnosis" onclick="switchTab('diagnosis')">Diagnosis</div>
      <div class="tab" data-tab="compare" onclick="switchTab('compare')">Compare</div>
    </div>
    <div id="tabPanel"></div>`;
  renderStatsPanel(summary,payload);
}

function renderStatsPanel(summary,p){
  const s=p.sectionMap;
  const br=s.BATTLE_REPORT||{}, dmg=s.DAMAGE||{}, dmgBlk=s.DAMAGE_BLOCKED||{};
  const dmgTkn=s.DAMAGE_TAKEN||{}, coins=s.COINS||{}, cash=s.CASH||{};
  const curr=s.CURRENCIES||{}, rec=s.RECORDS||{}, util=s.UTILITY||{};
  const counts=s.COUNTS||{}, enemies=s.TOTAL_ENEMIES||{};
  const destroyedBy=s.ENEMIES_DESTROYED_BY||{}, kwea=s.KILLED_WITH_EFFECT_ACTIVE||{};
  const hp=s.BONUS_HEALTH_GAINED||{}, hregen=s.HEALTH_REGENERATED||{};

  const totalDmgRaw=raw(dmg.damageDealt);
  const totalEnemies=enemies.totalEnemies||0;
  const totalKills=(destroyedBy.projectiles||0)+(destroyedBy.thorns||0)+(destroyedBy.landMines||0)+
    (destroyedBy.orbs||0)+(destroyedBy.chainLightning||0)+(destroyedBy.smartMissiles||0)+
    (destroyedBy.innerLandMines||0)+(destroyedBy.poisonSwamp||0)+(destroyedBy.deathRay||0)+
    (destroyedBy.blackHole||0)+(destroyedBy.flameBot||0)+(destroyedBy.other||0);

  const dmgSrc=[
    ['Orbs',raw(dmg.orbs)],['Chain Lightning',raw(dmg.chainLightning)],
    ['Thorns',raw(dmg.thorns)],['Black Hole',raw(dmg.blackHole)],
    ['Projectiles',raw(dmg.projectiles)],['Land Mines',raw(dmg.landMines)],
    ['Smart Missiles',raw(dmg.smartMissiles)],['Flame Bot',raw(dmg.flameBot)],
    ['Inner Land Mines',raw(dmg.innerLandMines)],['Death Wave',raw(dmg.deathWave)],
    ['Rend Armor',raw(dmg.rendArmor)],['Death Ray',raw(dmg.deathRay)],
    ['Attack Chip',raw(dmg.attackChip)],['Electrons',raw(dmg.electrons)],
    ['Poison Swamp',raw(dmg.poisonSwamp)]
  ].filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);

  const killSrc=[
    ['Orbs',destroyedBy.orbs||0],['Chain Lightning',destroyedBy.chainLightning||0],
    ['Land Mines',destroyedBy.landMines||0],['Projectiles',destroyedBy.projectiles||0],
    ['Smart Missiles',destroyedBy.smartMissiles||0],['Flame Bot',destroyedBy.flameBot||0],
    ['Black Hole',destroyedBy.blackHole||0],['Thorns',destroyedBy.thorns||0],
    ['Inner Land Mines',destroyedBy.innerLandMines||0],['Death Ray',destroyedBy.deathRay||0],
    ['Poison Swamp',destroyedBy.poisonSwamp||0],['Other',destroyedBy.other||0]
  ].filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);

  const blkSrc=[
    ['Defense %',raw(dmgBlk.defensePercent)],['Chrono Field',raw(dmgBlk.chronoField)],
    ['Chain Thunder',raw(dmgBlk.chainThunder)],['Flame Bot',raw(dmgBlk.flameBot)],
    ['Primordial Collapse',raw(dmgBlk.primordialCollapse)],
    ['Defense Absolute',raw(dmgBlk.defenseAbsolute)],
    ['Neg. Mass Projector',raw(dmgBlk.negativeMassProjector)]
  ].filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
  const totalBlk=blkSrc.reduce((a,[,v])=>a+v,0);

  const coinSrc=[
    ['Golden Tower',raw(coins.goldenTower)],['Black Hole',raw(coins.blackHole)],
    ['Other Bonuses',raw(coins.otherCoinBonuses)],['Golden Bot',raw(coins.goldenBot)],
    ['Death Wave',raw(coins.deathWave)],['Spotlight',raw(coins.spotlight)],
    ['Critical Coin',raw(coins.criticalCoin)],['Wave Skip',raw(coins.waveSkip)],
    ['Coins Fetched',raw(coins.coinsFetched)],['Bounty Coins',raw(coins.bountyCoins)]
  ].filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
  const totalCoins=raw(coins.coinsEarned);

  const enemyTypes=[
    ['Basic',enemies.basic||0],['Fast',enemies.fast||0],['Tank',enemies.tank||0],
    ['Ranged',enemies.ranged||0],['Boss',enemies.boss||0],['Protector',enemies.protector||0],
    ['Vampires',enemies.vampires||0],['Rays',enemies.rays||0],['Scatters',enemies.scatters||0],
    ['Saboteur',enemies.saboteur||0],['Commander',enemies.commander||0],['Overcharge',enemies.overcharge||0]
  ].filter(([,v])=>v>0);

  function barsHtml(rows,maxV,cls=''){
    return rows.map(([k,v])=>`<tr>
      <td>${k}</td>
      <td><div class="bar-row"><div class="bar-fill ${cls}" style="width:${Math.round(v/(maxV||1)*120)}px"></div></div></td>
      <td class="val-num">${fmtRaw(v)}</td>
      <td class="val-pct">${pct(v,maxV)}%</td>
    </tr>`).join('');
  }

  document.getElementById('tabPanel').innerHTML=`
    <div class="section-title">Overview</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Coins Earned</div><div class="value gold">${disp(br.coinsEarned)}</div></div>
      <div class="stat-card"><div class="label">Coins / Hour</div><div class="value gold">${disp(br.coinsPerHour)}</div></div>
      <div class="stat-card"><div class="label">Cells Earned</div><div class="value accent">${disp(br.cellsEarned)}</div></div>
      <div class="stat-card"><div class="label">Cells / Hour</div><div class="value accent">${disp(br.cellsPerHour)}</div></div>
      <div class="stat-card"><div class="label">Damage Dealt</div><div class="value">${disp(dmg.damageDealt)}</div></div>
      <div class="stat-card"><div class="label">Total Enemies</div><div class="value">${totalEnemies.toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Cash Earned</div><div class="value green">${disp(cash.cashEarned)}</div></div>
      <div class="stat-card"><div class="label">Tower Era</div><div class="value" style="font-size:0.8rem">${br.towerEra||'—'}</div></div>
    </div>
    <div class="section-title">Records</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Highest Coins/Min</div><div class="value gold">${disp(rec.highestCoinsPerMinute)}</div></div>
      <div class="stat-card"><div class="label">Largest Wave Skip</div><div class="value accent">${rec.largestWaveSkip||0}</div></div>
      <div class="stat-card"><div class="label">Most Coins from Skip</div><div class="value gold">${disp(rec.mostCoinsFromWaveSkip)}</div></div>
      <div class="stat-card"><div class="label">Missile Stack</div><div class="value">${rec.largestSmartMissileStack||0}</div></div>
      <div class="stat-card"><div class="label">Golden Combo</div><div class="value gold">${rec.largestGoldenCombo||0}</div></div>
      <div class="stat-card"><div class="label">Inner Mine Charge</div><div class="value">${disp(rec.largestInnerLandmineCharge)}</div></div>
    </div>
    <div class="section-title">Damage Breakdown</div>
    <div class="two-col">
      <div class="table-section"><table>
        <thead><tr><th>Source</th><th></th><th>Damage</th><th>%</th></tr></thead>
        <tbody>${barsHtml(dmgSrc,totalDmgRaw)}</tbody>
      </table></div>
      <div class="table-section"><table>
        <thead><tr><th>Killed by</th><th></th><th>Kills</th><th>%</th></tr></thead>
        <tbody>${barsHtml(killSrc,totalKills,'gold')}</tbody>
      </table></div>
    </div>
    <div class="section-title">Defense &amp; Economy</div>
    <div class="two-col">
      <div class="table-section"><table>
        <thead><tr><th>Damage Blocked</th><th></th><th>Amount</th><th>%</th></tr></thead>
        <tbody>${barsHtml(blkSrc,totalBlk,'green')}</tbody>
      </table></div>
      <div class="table-section"><table>
        <thead><tr><th>Coin Source</th><th></th><th>Coins</th><th>%</th></tr></thead>
        <tbody>${barsHtml(coinSrc,totalCoins,'gold')}</tbody>
      </table></div>
    </div>
    <div class="section-title">Survival</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Lifesteal</div><div class="value green">${disp(hregen.lifeSteal)}</div></div>
      <div class="stat-card"><div class="label">Wall Health Regen</div><div class="value green">${disp(hregen.wallHealthRegen)}</div></div>
      <div class="stat-card"><div class="label">Tower Health Regen</div><div class="value green">${disp(hregen.towerHealthRegen)}</div></div>
      <div class="stat-card"><div class="label">Bonus HP (DW)</div><div class="value green">${disp(hp.fromDeathWave)}</div></div>
      <div class="stat-card"><div class="label">Tower Damage Taken</div><div class="value red">${disp(dmgTkn.tower)}</div></div>
      <div class="stat-card"><div class="label">Wall Damage Taken</div><div class="value red">${disp(dmgTkn.wall)}</div></div>
    </div>
    <div class="section-title">Enemy Composition</div>
    <div class="two-col">
      <div class="table-section"><table>
        <thead><tr><th>Type</th><th></th><th>Count</th><th>%</th></tr></thead>
        <tbody>${barsHtml(enemyTypes,totalEnemies,'orange')}</tbody>
      </table></div>
      <div class="table-section"><table>
        <thead><tr><th>Effect Active</th><th>Kills</th></tr></thead>
        <tbody>${[['Golden Tower',kwea.goldenTower],['Spotlight',kwea.spotlight],
          ['Golden Bot',kwea.goldenBot],['Death Wave',raw(kwea.deathWave)],
          ['Amplify Bot',kwea.amplifyBot],['Death Penalty',kwea.deathPenalty]]
          .filter(([,v])=>v>0)
          .map(([k,v])=>`<tr><td>${k}</td><td class="val-num">${Number(v).toLocaleString()}</td></tr>`).join('')}
        </tbody>
      </table></div>
    </div>
    <div class="section-title">Utility &amp; Counts</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Recovery Packages</div><div class="value accent">${util.recoveryPackages||0}</div></div>
      <div class="stat-card"><div class="label">Free Atk Upgrades</div><div class="value accent">${util.freeAttackUpgrades||0}</div></div>
      <div class="stat-card"><div class="label">Free Def Upgrades</div><div class="value accent">${util.freeDefenseUpgrades||0}</div></div>
      <div class="stat-card"><div class="label">Free Util Upgrades</div><div class="value accent">${util.freeUtilityUpgrades||0}</div></div>
      <div class="stat-card"><div class="label">Waves Skipped</div><div class="value">${counts.wavesSkipped||0}</div></div>
      <div class="stat-card"><div class="label">Land Mines Spawned</div><div class="value">${(counts.landMinesSpawned||0).toLocaleString()}</div></div>
      <div class="stat-card"><div class="label">Enemy Atk Lvls Skip</div><div class="value">${util.enemyAttackLevelSkipped||0}</div></div>
      <div class="stat-card"><div class="label">Enemy HP Lvls Skip</div><div class="value">${util.enemyHealthLevelSkipped||0}</div></div>
    </div>
    <div class="section-title">Currencies &amp; Shards</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Gems</div><div class="value gold">${curr.gems||0}</div></div>
      <div class="stat-card"><div class="label">Ad Gems</div><div class="value gold">${curr.adGems||0}</div></div>
      <div class="stat-card"><div class="label">Fetch Gems</div><div class="value gold">${curr.fetchGems||0}</div></div>
      <div class="stat-card"><div class="label">Medals</div><div class="value">${curr.medals||0}</div></div>
      <div class="stat-card"><div class="label">Reroll Shards</div><div class="value accent">${disp(curr.reRollShardsEarned)}</div></div>

async function runComparison(id1){
  const id2=document.getElementById('compareSelect').value;
  if(!id2)return;
  chatState={id1,id2,history:[],provider:'gemini'};
  document.getElementById('compareResult').innerHTML='<div class="loading-placeholder">Comparing…</div>';
  try{
    const res=await fetch(`${API}/reports/${encodeURIComponent(id1)}/comparison/${encodeURIComponent(id2)}`);
    const [r1,r2,delta]=await res.json();
    const lowerBetter=new Set(['DAMAGE_TAKEN.tower','DAMAGE_TAKEN.wall']);
    const sections=[
      ['BATTLE_REPORT',['tier','wave','coinsEarned','coinsPerHour','cellsEarned','cellsPerHour','killedBy','towerEra'],'Battle Report'],
      ['RECORDS',['highestCoinsPerMinute','largestWaveSkip','mostCoinsFromWaveSkip','largestSmartMissileStack','largestGoldenCombo'],'Records'],
      ['DAMAGE',['damageDealt','projectiles','orbs','chainLightning','thorns','landMines','smartMissiles','flameBot','blackHole','deathWave','deathRay'],'Damage'],
      ['DAMAGE_TAKEN',['tower','wall'],'Damage Taken'],
      ['DAMAGE_BLOCKED',['defensePercent','chronoField','chainThunder','flameBot','primordialCollapse'],'Damage Blocked'],
      ['HEALTH_REGENERATED',['lifeSteal','wallHealthRegen','towerHealthRegen'],'Health Regenerated'],
      ['COINS',['coinsEarned','goldenTower','blackHole','goldenBot','deathWave','spotlight'],'Coins'],
      ['CURRENCIES',['cellsEarned','gems','medals','reRollShardsEarned'],'Currencies'],
      ['ENEMIES_DESTROYED_BY',['orbs','chainLightning','landMines','projectiles','smartMissiles','flameBot'],'Enemies Destroyed By'],
    ];
    let html=`<div class="table-section"><table>
      <thead><tr><th>Field</th><th>${id1}</th><th>${id2}</th><th>Delta</th></tr></thead><tbody>`;
    sections.forEach(([sec,fields,title])=>{
      html+=`<tr><td colspan="4" style="background:var(--surface2);font-size:11px;text-transform:uppercase;
        letter-spacing:1px;color:var(--muted);padding:8px 13px">${title}</td></tr>`;
      const s1=(r1.sectionMap||{})[sec]||{};
      const s2=(r2.sectionMap||{})[sec]||{};
      const sd=(delta.sectionMap||{})[sec]||{};
      fields.forEach(f=>{
        const isLower=lowerBetter.has(`${sec}.${f}`);
        const dv=sd[f];
        const dRaw=typeof dv==='object'&&dv!==null?dv.raw:dv;
        const dStr=fmtField(dv);
        let dClass='delta-neu';
        if(dRaw&&dRaw!==0){const good=isLower?dRaw<0:dRaw>0;dClass=good?'delta-pos':'delta-neg';}
        html+=`<tr>
          <td style="color:var(--muted)">${camel(f)}</td>
          <td style="font-family:var(--mono);font-size:13px">${fmtField(s1[f])}</td>
          <td style="font-family:var(--mono);font-size:13px">${fmtField(s2[f])}</td>
          <td class="${dClass}">${dStr}</td>
        </tr>`;
      });
    });
    html+='</tbody></table></div>';
    html+=`<div style="margin:1rem 0 2rem;display:flex;gap:0.5rem">
      <button class="btn" onclick="exportComparison('${id1}','${id2}')">Export to Markdown</button>
      <span id="cmpExportStatus" style="font-size:12px;color:var(--muted);align-self:center"></span>
    </div>`;
    html+='<div style="height:2rem"></div>';
    document.getElementById('compareResult').innerHTML=html;
    const chat=document.getElementById('geminiChat');
    chat.style.display='block';
    document.getElementById('geminiThread').innerHTML='';
    await Promise.all([loadChatHistory(id1,id2), populatePromptSelector()]);
  }catch(e){
    document.getElementById('compareResult').innerHTML=`<div style="color:var(--red);padding:1rem">${e.message}</div>`;
  }
}

async function sendGeminiChat(){
  const prompt=document.getElementById('geminiPrompt').value.trim();
  if(!prompt)return;
  const contextTypes=[];
  if(document.getElementById('geminiCtxComparison')?.checked)contextTypes.push('comparison_report');
  if(document.getElementById('geminiCtxDiagnosis')?.checked)contextTypes.push('diagnosis_report');
  if(document.getElementById('geminiCtxProfile').checked)contextTypes.push('user_profile');
  if(document.getElementById('geminiCtxCurrencies').checked)contextTypes.push('player_currencies');
  if(document.getElementById('geminiCtxLabs').checked)contextTypes.push('labs');
  if(document.getElementById('geminiCtxUltimateWeapons').checked)contextTypes.push('ultimate_weapons');
  if(document.getElementById('geminiCtxModules').checked)contextTypes.push('modules');
  if(document.getElementById('geminiCtxModulesFarming').checked)contextTypes.push('modules_farming');
  if(document.getElementById('geminiCtxModulesTournament').checked)contextTypes.push('modules_tournament');
  if(document.getElementById('geminiCtxCards').checked)contextTypes.push('cards');
  if(document.getElementById('geminiCtxCardsFarming').checked)contextTypes.push('cards_farming');
  if(document.getElementById('geminiCtxCardsTournament').checked)contextTypes.push('cards_tournament');
  if(document.getElementById('geminiCtxWorkshop').checked)contextTypes.push('workshop');
  if(document.getElementById('geminiCtxGuardians').checked)contextTypes.push('guardians');
  if(document.getElementById('geminiCtxBots').checked)contextTypes.push('bots');
  if(document.getElementById('geminiCtxRelics').checked)contextTypes.push('relics');
  if(document.getElementById('geminiCtxTierWave').checked)contextTypes.push('tier_wave');
  if(document.getElementById('geminiCtxVersionHistory').checked)contextTypes.push('version_history');
  const sendBtn=document.getElementById('geminiSendBtn');
  sendBtn.disabled=true;
  const thread=document.getElementById('geminiThread');
  thread.insertAdjacentHTML('beforeend',
    `<div class="chat-turn user"><div class="chat-turn-label">You</div>${escHtml(prompt)}</div>
     <div id="geminiLoading" class="loading-placeholder" style="padding:8px 0;text-align:left">Thinking…</div>`);
  document.getElementById('geminiPrompt').value='';
  thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  const provider=chatState.provider||'gemini';
  const modelRole=provider==='claude'?'assistant':'model';
  const modelLabel=provider==='claude'?'Claude':'Gemini';
  try{
    const res=await fetch(`${API}/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,contextTypes,reportId1:chatState.id1,reportId2:chatState.id2,history:chatState.history,promptKey:document.getElementById('geminiPromptKey').value||null,provider})
    });
    if(!res.ok)throw new Error(await res.text());
    const data=await res.json();
    const{reply,prependedTurns}=data;
    // Silently add context preamble turns to history so they're included in future sends
    if(prependedTurns&&prependedTurns.length>0){
      for(const t of prependedTurns)chatState.history.push({role:t.role,text:t.text});
    }
    chatState.history.push({role:'user',text:prompt});
    chatState.history.push({role:modelRole,text:reply});
    document.getElementById('geminiLoading').remove();
    thread.insertAdjacentHTML('beforeend',
      `<div class="chat-turn model"><div class="chat-turn-label">${modelLabel}</div>${renderMarkdown(reply)}</div>`);
    thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){
    document.getElementById('geminiLoading').remove();
    thread.insertAdjacentHTML('beforeend',
      `<div style="color:var(--red);padding:8px 0;font-size:13px">${escHtml(e.message)}</div>`);
  }finally{
    sendBtn.disabled=false;
  }
}

async function loadChatHistory(id1,id2){
  try{
    const provider=chatState.provider||'gemini';
    const modelLabel=provider==='claude'?'Claude':'Gemini';
    const params=new URLSearchParams({reportId1:id1,provider});
    if(id2)params.append('reportId2',id2);
    const res=await fetch(`${API}/chat/history?${params}`);
    if(!res.ok)return;
    const history=await res.json();
    chatState.history=history.map(t=>({role:t.role,text:t.text}));
    const thread=document.getElementById('geminiThread');
    for(const turn of history){
      if(turn.role==='context'||turn.role==='context_ack')continue;
      const isUser=turn.role==='user';
      const label=isUser?'You':modelLabel;
      const cls=isUser?'user':'model';
      thread.insertAdjacentHTML('beforeend',
        `<div class="chat-turn ${cls}"><div class="chat-turn-label">${label}</div>${cls==='model'?renderMarkdown(turn.text):escHtml(turn.text)}</div>`);
    }
    if(history.length>0)thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){/* silently ignore */}
}

async function clearChatHistory(){
  if(!chatState.id1)return;
  try{
    const provider=chatState.provider||'gemini';
    const params=new URLSearchParams({reportId1:chatState.id1,provider});
    if(chatState.id2)params.append('reportId2',chatState.id2);
    await fetch(`${API}/chat/history?${params}`,{method:'DELETE'});
    chatState.history=[];
    document.getElementById('geminiThread').innerHTML='';
  }catch(e){/* silently ignore */}
}

async function loadShards(days){
  const lvl=t=>Number(document.getElementById('shardLvl_'+t)?.value)||1;
  const tgt=t=>Number(document.getElementById('shardTgt_'+t)?.value)||161;
  const cannon=lvl('cannon'),armor=lvl('armor'),generator=lvl('generator'),core=lvl('core');
  const cannonTgt=tgt('cannon'),armorTgt=tgt('armor'),generatorTgt=tgt('generator'),coreTgt=tgt('core');
  const discount=Number(document.getElementById('shardDiscountLvl')?.value)||0;
  const dataSource=document.getElementById('shardDataSource')?.value||'BATTLE_REPORTS';
  const isSnapshots=dataSource==='SNAPSHOTS';

  // Update source note
  const noteEl=document.getElementById('shardSourceNote');
  if(noteEl){
    if(isSnapshots){
      // Fetch snapshot count and warn if low
      try{
        const cnt=await fetch(`${API}/analysis/shards/snapshot-count`).then(r=>r.json());
        noteEl.innerHTML=cnt<5
          ? `<span style="color:var(--orange)">⚠ Only ${cnt} snapshot${cnt===1?'':'s'} on record — accumulate at least 5 via Export Context before relying on this mode (need 4 intervals for reliable 2σ filtering).</span>`
          : `<span style="color:var(--green)">✓ ${cnt} snapshots · rates computed from currency inventory deltas</span>`;
      }catch(e){noteEl.textContent='Currency Snapshots mode';}
    } else {
      noteEl.textContent='Farming runs only · excludes Tournament, Dissonance, Event';
    }
  }

  try{
    const url=isSnapshots
      ? `${API}/analysis/shards?days=${days}`
          +`&cannonLevel=${cannon}&armorLevel=${armor}&generatorLevel=${generator}&coreLevel=${core}`
          +`&shardCostDiscountLevel=${discount}`
          +`&targetLevel=${cannonTgt}`
          +`&dataSource=SNAPSHOTS`
      : `${API}/analysis/shards?days=${days}`
          +`&cannonLevel=${cannon}&armorLevel=${armor}&generatorLevel=${generator}&coreLevel=${core}`
          +`&shardCostDiscountLevel=${discount}`
          +`&cannonTargetLevel=${cannonTgt}&armorTargetLevel=${armorTgt}&generatorTargetLevel=${generatorTgt}&coreTargetLevel=${coreTgt}`
          +`&dataSource=BATTLE_REPORTS`;
    const res=await fetch(url);
    const d=await res.json();
    const zeroShards={cannon:0,armor:0,generator:0,core:0};
    const a=d.averages??zeroShards, sd=d.stdDev??zeroShards, pr=d.projections??{};
    const pts=d.dataPoints??[];

    const fmtH=h=>{
      if(h==null||h<0)return '—';
      if(h<1)return Math.round(h*60)+'m';
      if(h<24)return h.toFixed(1)+'h';
      return (h/24).toFixed(1)+'d';
    };

    const discountBadge=proj=>proj.discountLevel>0
      ? `<span style="color:var(--green);font-size:10px"> (${proj.discountLevel}% off)</span>`
      : '';

    const nextLine=proj=>{
      const hasDiscount=proj.discountLevel>0 && proj.shardsToNextLevelEffective!==proj.shardsToNextLevelBase;
      return `next upgrade: `
        + (hasDiscount
            ? `<span style="text-decoration:line-through;color:var(--muted)">${proj.shardsToNextLevelBase.toLocaleString()}</span> `
              + `<b style="color:var(--gold)">${proj.shardsToNextLevelEffective.toLocaleString()}</b>${discountBadge(proj)}`
            : `<b style="color:var(--gold)">${proj.shardsToNextLevelEffective.toLocaleString()}</b>`)
        + ` · <b style="color:var(--gold)">${fmtH(proj.hoursToNextLevel)}</b>`;
    };

    const lvl161Line=proj=>{
      if(proj.shardsToTargetLevelEffective<=0) return `<span style="color:var(--green)">✓ Already at Lvl ${proj.targetLevel}+</span>`;
      const hasDiscount=proj.discountLevel>0 && proj.shardsToTargetLevelEffective!==proj.shardsToTargetLevelBase;
      return `To <b style="color:var(--accent2)">Lvl ${proj.targetLevel}</b>: `
        + (hasDiscount
            ? `<span style="text-decoration:line-through;color:var(--muted)">${proj.shardsToTargetLevelBase.toLocaleString()}</span> `
              + `<b style="color:var(--accent)">${proj.shardsToTargetLevelEffective.toLocaleString()}</b>${discountBadge(proj)}`
            : `<b style="color:var(--accent)">${proj.shardsToTargetLevelEffective.toLocaleString()}</b>`)
        + ` · <b style="color:var(--accent)">${fmtH(proj.hoursToTargetLevel)}</b>`;
    };

    const projCard=(label,avg,std,proj)=>`
      <div class="stat-card">
        <div class="label">${label} · Avg/hr</div>
        <div class="value green">${fmtRaw(avg)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">±${fmtRaw(std)} std dev</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.8">
          <b style="color:var(--text)">Lvl ${proj.currentLevel}</b> · ${nextLine(proj)}<br>
          ${lvl161Line(proj)}
        </div>
      </div>`;

    const maxRate=Math.max(...pts.flatMap(p=>[p.cannonPerHour,p.armorPerHour,p.generatorPerHour,p.corePerHour]),1);

    document.getElementById('shardsPanel').innerHTML=`
      <div class="stat-grid" style="margin-bottom:1.5rem">
        <div class="stat-card"><div class="label">Runs Analyzed</div><div class="value accent">${d.runsAnalyzed}</div></div>
        ${projCard('Cannon',   a.cannon,    sd.cannon,    pr.cannon)}
        ${projCard('Armor',    a.armor,     sd.armor,     pr.armor)}
        ${projCard('Generator',a.generator, sd.generator, pr.generator)}
        ${projCard('Core',     a.core,      sd.core,      pr.core)}
      </div>
      <table class="trend-table">
        <thead><tr>
          <th>Date</th><th style="text-align:right">Tier</th><th style="text-align:right">Wave</th>
          <th style="text-align:right">Cannon/hr</th><th style="text-align:right">Armor/hr</th>
          <th style="text-align:right">Generator/hr</th><th style="text-align:right">Core/hr</th>
          <th>Duration</th><th>Best Rate</th>
        </tr></thead>
        <tbody>${pts.map(p=>{
          const best=Math.max(p.cannonPerHour,p.armorPerHour,p.generatorPerHour,p.corePerHour);
          return `<tr>
            <td>${p.battleDate}</td>
            <td class="val-num">T${p.tier}</td>
            <td class="val-num">${p.wave.toLocaleString()}</td>
            <td class="val-num">${fmtRaw(p.cannonPerHour)}</td>
            <td class="val-num">${fmtRaw(p.armorPerHour)}</td>
            <td class="val-num">${fmtRaw(p.generatorPerHour)}</td>
            <td class="val-num">${fmtRaw(p.corePerHour)}</td>
            <td style="color:var(--muted)">${fmtDuration(p.realTimeSeconds)}</td>
            <td><div class="bar-fill green" style="width:${Math.round(best/maxRate*80)}px;height:5px;border-radius:3px;display:inline-block"></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      <div style="height:2rem"></div>`;
  }catch(e){
    document.getElementById('shardsPanel').innerHTML=`<div style="color:var(--red);padding:1rem">${e.message}</div>`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function raw(v){if(v==null)return 0;if(typeof v==='object'&&'raw'in v)return v.raw;return Number(v)||0;}
function disp(v){if(v==null)return '0';if(typeof v==='object'&&'display'in v)return v.display;return String(v);}
function fmtField(v){
  if(v==null)return '—';
  if(typeof v==='object'&&'display'in v)return v.display;
  if(typeof v==='number')return v.toLocaleString();
  return String(v);
}
function fmtRaw(n){
  if(n==null||n===''||isNaN(n))return '0';
  n=Number(n);
  const a=Math.abs(n);
  if(a>=1e33)return(n/1e33).toFixed(2)+'d'; if(a>=1e30)return(n/1e30).toFixed(2)+'N';
  if(a>=1e27)return(n/1e27).toFixed(2)+'O'; if(a>=1e24)return(n/1e24).toFixed(2)+'S';
  if(a>=1e21)return(n/1e21).toFixed(2)+'s'; if(a>=1e18)return(n/1e18).toFixed(2)+'Q';
  if(a>=1e15)return(n/1e15).toFixed(2)+'q'; if(a>=1e12)return(n/1e12).toFixed(2)+'T';
  if(a>=1e9)return(n/1e9).toFixed(2)+'B';   if(a>=1e6)return(n/1e6).toFixed(2)+'M';
  if(a>=1e3)return(n/1e3).toFixed(2)+'K';
  return Number.isInteger(n)?n.toString():n.toFixed(2);
}
function fmtDuration(s){
  if(!s)return '0s';
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>0)return`${d}d ${h}h ${m}m`;
  if(h>0)return`${h}h ${m}m`;
  return`${m}m ${sec}s`;
}
function fmtPct(v){return v!=null?(v*100).toFixed(1)+'%':'—';}
function pct(v,total){return total?Math.round((v/total)*100):0;}
function camel(s){return s.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase());}

const UW_COLORS={
  CL:'#4facf7', SM:'#7c9fcf', DW:'#f26b6b', CF:'#3dd68c',
  ILM:'#a875f7', GT:'#f5c842', PS:'#6bcf7c', BH:'#6b9ef2', SP:'#d0d0d0'
};

const UW_FMT={
  'Damage':      v=>`x${fmtUwN(v)}`,
  'Quantity':    v=>`x${fmtUwN(v)}`,
  'Chance':      v=>`${v}%`,
  'Duration':    v=>`${fmtUwN(v)}s`,
  '-Speed':      v=>`${fmtUwN(v)}%`,
  'Cooldown':    v=>`${fmtUwN(v)}s`,
  'Multiplier':  v=>`x${v}`,
  'Angle':       v=>`${fmtUwN(v)}°`,
  'Size':        v=>`${fmtUwN(v)}m`,
  'Smite':       v=>`${v}%`,
  'Cover Fire':  v=>`${fmtUwN(v)}s`,
  'Kill Wall':   v=>`x${fmtUwN(v)}`,
  'Chrono Loop': v=>`${v} r/2s`,
  'Charged Mines':v=>`${v}/s`,
  'Golden Combo':v=>`${v}%`,
  'Death Creep': v=>`+${fmtUwN(v)}%`,
  'Consume':     v=>`${v}%`,
  'Light Range': v=>`x${v}`
};
function fmtUwN(v){return Number.isInteger(v)?v.toLocaleString():v;}
function fmtStatVal(label,val){const f=UW_FMT[label];return f?f(val):String(val);}

async function renderUwView(){
  document.getElementById('mainContent').innerHTML=
    '<div class="loading-placeholder" style="padding:4rem;text-align:center">Loading UW data…</div>';
  try{
    const res=await fetch(`${API}/uw`);
    if(!res.ok)throw new Error(res.statusText);
    const uws=await res.json();
    const totalInvested=uws.flatMap(u=>u.stats).reduce((s,st)=>s+st.stonesInvested,0);
    const totalNextAll=uws.flatMap(u=>u.stats).reduce((s,st)=>s+st.stonesToMax,0);
    const totalToTargets=uws.flatMap(u=>u.stats).reduce((s,st)=>s+st.stonesToTarget,0);
    const unlocked=uws.filter(u=>u.unlocked).length;
    document.getElementById('mainContent').innerHTML=`
      <div class="report-title" style="margin-bottom:1rem">Ultimate Weapons</div>
      <div class="uw-stones-total">
        <div class="uw-stones-chip"><div class="lbl">UWs Unlocked</div><div class="val">${unlocked} / 9</div></div>
        <div class="uw-stones-chip"><div class="lbl">Total Stones Invested</div><div class="val">${totalInvested.toLocaleString()}</div></div>
        <div class="uw-stones-chip"><div class="lbl">Stones to Planned Targets</div><div class="val" style="color:var(--orange)">${totalToTargets.toLocaleString()}</div></div>
        <div class="uw-stones-chip"><div class="lbl">Stones to Max Everything</div><div class="val">${totalNextAll.toLocaleString()}</div></div>
      </div>
      <div class="uw-grid">${uws.map(renderUwCard).join('')}</div>`;
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Failed to load</h2><p>${e.message}</p></div>`;
  }
}

function renderUwCard(uw){
  const color=UW_COLORS[uw.code]||'var(--accent)';
  const baseStats=uw.stats.filter(s=>s.statKey!=='UW_PLUS');
  const uwPlus=uw.stats.find(s=>s.statKey==='UW_PLUS');
  const uwStonesToTarget=uw.stats.reduce((s,st)=>s+st.stonesToTarget,0);
  return `
    <div class="uw-card" style="border-top:3px solid ${color}">
      <div class="uw-card-header">
        <span class="uw-name" style="color:${color}">${uw.name}</span>
        <label class="uw-toggle">
          <input type="checkbox" ${uw.unlocked?'checked':''}
            onchange="setUwUnlocked(${uw.uwId},this.checked)"> Unlocked
        </label>
        <label class="uw-toggle">
          <input type="checkbox" ${uw.uwPlusUnlocked?'checked':''} ${!uw.unlocked?'disabled':''}
            onchange="setUwPlusUnlocked(${uw.uwId},this.checked)"> ${uw.uwPlusName}
        </label>
        ${uwStonesToTarget>0?`<span style="font-size:10px;color:var(--orange);white-space:nowrap;margin-left:4px">→ ${uwStonesToTarget.toLocaleString()} stones</span>`:''}
      </div>
      <table class="uw-stats-table">
        <thead><tr>
          <th>Stat</th><th>Value</th>
          <th style="text-align:right">Lvl</th>
          <th style="text-align:right">Target</th>
          <th style="text-align:right">→ Target</th>
          <th style="text-align:right">Invested</th>
          <th style="text-align:right">→ Max</th>
        </tr></thead>
        <tbody>
          ${baseStats.map(s=>renderUwStatRow(s,uw.unlocked,false)).join('')}
          ${uwPlus?renderUwStatRow(uwPlus,uw.unlocked,!uw.uwPlusUnlocked,true):''}
        </tbody>
      </table>
    </div>`;
}

function renderUwStatRow(stat,uwUnlocked,isLocked,isUwPlus=false){
  const disabled=!uwUnlocked||isLocked;
  const valDisplay=disabled?'—':fmtStatVal(stat.label,stat.currentValue);
  const investedDisplay=disabled?'—':stat.stonesInvested.toLocaleString();
  const toMaxDisplay=disabled?'—':(stat.stonesToMax>0?stat.stonesToMax.toLocaleString():'<span style="color:var(--green);font-size:10px">Max</span>');
  const toTargetDisplay=disabled?'—':(stat.stonesToTarget>0
    ?`<span style="color:var(--orange)">${stat.stonesToTarget.toLocaleString()}</span>`
    :(stat.targetLevel>0&&stat.targetLevel<=stat.currentLevel
      ?'<span style="color:var(--green);font-size:10px">Met</span>'
      :'—'));
  const lvlOpts=Array.from({length:stat.maxLevel+1},(_,i)=>
    `<option value="${i}"${i===stat.currentLevel?' selected':''}>${String(i).padStart(2,'0')}</option>`
  ).join('');
  const tgtOpts=Array.from({length:stat.maxLevel+1},(_,i)=>
    `<option value="${i}"${i===stat.targetLevel?' selected':''}>${String(i).padStart(2,'0')}</option>`
  ).join('');
  return `<tr class="${disabled?'uw-row-locked':''}${isUwPlus?' uw-plus-row':''}">
    <td>${stat.label}</td>
    <td class="uw-val">${valDisplay}</td>
    <td class="uw-lvl-cell">
      <select class="uw-level-select" ${disabled?'disabled':''}
        onchange="setStatLevel(${stat.statId},parseInt(this.value))">${lvlOpts}</select>
    </td>
    <td class="uw-lvl-cell">
      <select class="uw-level-select" ${disabled?'disabled':''}
        onchange="setTargetLevel(${stat.statId},parseInt(this.value))">${tgtOpts}</select>
    </td>
    <td class="uw-stones">${toTargetDisplay}</td>
    <td class="uw-stones">${investedDisplay}</td>
    <td class="uw-stones">${toMaxDisplay}</td>
  </tr>`;
}

function saveUwScroll(){sessionStorage.setItem('uw-scroll',document.getElementById('mainContent').scrollTop);}
function restoreUwScroll(){
  const top=parseInt(sessionStorage.getItem('uw-scroll')||'0',10);
  requestAnimationFrame(()=>document.getElementById('mainContent').scrollTop=top);
}
async function refreshUwView(){await renderUwView();restoreUwScroll();}

  saveUwScroll();
  await fetch(`${API}/uw/${uwId}/unlocked`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({unlocked})});
  refreshUwView();
}

function modSubstatLabel(type,key){
  const list=MOD_SUBSTATS[type]||[];
  return (list.find(s=>s.key===key)||{label:key}).label;
}

function abilityRarity(rarity){
  if(rarity==='Ancestral'||rarity==='Mythic+'||rarity==='Mythic')return 'Mythic';
  if(rarity==='Legendary+'||rarity==='Legendary')return 'Legendary';
  return 'Epic';
}
function currentAbilityDisplay(mod){
  const key=mod.rarity==='Ancestral'?'Ancestral'
    :mod.rarity.startsWith('Mythic')?'Mythic'
    :mod.rarity.startsWith('Legendary')?'Legendary':'Epic';
  return mod.abilityValues[key]||'—';
}

const MOD_PRESETS=['Farming','Tournament','Testing'];
const MOD_SLOTS=['primary','assist'];

function renderPresetChips(mod, allMods){
  const myPresets=new Set((mod.presets||[]).map(p=>`${p.preset}:${p.slot}`));
  // For each combo, check if another module of the same type already holds it
  const takenCombos=new Set();
  for(const other of allMods){
    if(other.id===mod.id||other.type!==mod.type)continue;
    for(const p of (other.presets||[])) takenCombos.add(`${p.preset}:${p.slot}`);
  }
  return MOD_PRESETS.flatMap(preset=>MOD_SLOTS.map(slot=>{
    const key=`${preset}:${slot}`;
    const active=myPresets.has(key);
    const taken=!active&&takenCombos.has(key);
    const label=`${preset} ${slot.charAt(0).toUpperCase()+slot.slice(1)}`;
    return `<span class="mod-preset-chip${active?' active '+preset:''}${taken?' taken':''}"
      title="${taken?'Already assigned to another '+mod.type+' module':''}"
      onclick="${taken?'':`modTogglePreset(${mod.id},'${preset}','${slot}',${active})`}"
    >${label}</span>`;
  })).join('');
}

function renderModCard(mod, allMods){
  const color=MOD_TYPE_COLOR[mod.type];
  const equippedBadge=mod.equippedSlot
    ?`<span class="mod-equipped-badge ${mod.equippedSlot}">${mod.equippedSlot}</span>`:'';

  const rarityOpts=MOD_RARITIES.map(r=>`<option value="${r}"${r===mod.rarity?' selected':''}>${r}</option>`).join('');
  const starsOpts=Array.from({length:6},(_,i)=>`<option value="${i}"${i===mod.stars?' selected':''}>${i}★</option>`).join('');
  const slotOpts=['<option value="">—</option>',
    `<option value="primary"${mod.equippedSlot==='primary'?' selected':''}>Primary</option>`,
    `<option value="assist"${mod.equippedSlot==='assist'?' selected':''}>Assist</option>`].join('');

  const abilityChips=Object.entries(mod.abilityValues).map(([r,v])=>{
    const isCurrentTier=(mod.rarity.startsWith(r))||(r==='Ancestral'&&mod.rarity==='Ancestral');
    return `<span class="mod-ability-chip${isCurrentTier?' current':''}" title="${r}">${r[0]}: ${v}</span>`;
  }).join('');

  // Sub-stats: 8 slots, unlocked at levels 1,1,41,101,141,161,201,241
  const SLOT_UNLOCK=[1,1,41,101,141,161,201,241];
  const typeSubstats=MOD_SUBSTATS[mod.type]||[];

  let substatRows='';
  for(let slot=0;slot<8;slot++){
    const unlockLevel=SLOT_UNLOCK[slot];
    const slotUnlocked=mod.level>=unlockLevel;
    const ss=mod.substats.find(s=>s.slot===slot);
    const keyVal=ss?ss.key:'';
    const rar=ss?ss.rarity||'Common':'Common';
    const locked=ss&&ss.locked;
    const rarCss=rar.replace('+','');
    const rarDisplay=ss
      ?`<span class="mod-substat-rarity ${rarCss}">${rar}</span>`
      :`<span class="mod-substat-rarity Common" style="opacity:0.3">—</span>`;
    const lockedStyle=slotUnlocked?'':'opacity:0.35;pointer-events:none';
    const unlockNote=!slotUnlocked?`<span style="font-size:10px;color:var(--muted)">Lvl ${unlockLevel}</span>`:'';
    substatRows+=`<div class="mod-substat-row" style="${lockedStyle}">
      <span class="mod-slot-num">${slot+1}</span>
      ${rarDisplay}
      <select class="mod-select" style="flex:1;font-size:11px" ${!slotUnlocked?'disabled':''}
        onchange="modSetSubstatKey(${mod.id},${slot},this.value,'${rar}',${locked})">
        ${typeSubstats.map(s=>`<option value="${s.key}"${s.key===keyVal?' selected':''}>${s.label}</option>`).join('')}
        ${!keyVal?'<option value="" selected disabled>— empty —</option>':''}
      </select>
      <select class="mod-select" style="width:80px;font-size:11px" ${!slotUnlocked?'disabled':''}
        onchange="modSetSubstatRarity(${mod.id},${slot},'${keyVal}',this.value,${locked})">
        ${MOD_SUB_RARITIES.map(r=>`<option value="${r}"${r===rar?' selected':''}>${r}</option>`).join('')}
      </select>
      <button class="mod-lock-btn${locked?' locked':''}" title="${locked?'Unlock':'Lock'}"
        onclick="modToggleLock(${mod.id},${slot},'${keyVal}','${rar}',${locked})">${locked?'🔒':'🔓'}</button>
      ${ss?`<button class="mod-lock-btn" title="Clear" onclick="modClearSubstat(${mod.id},${slot})" style="color:var(--red)">✕</button>`:''}
      ${unlockNote}
    </div>`;
  }

  // Copies
  const copies=mod.copies||[];
  const copyChips=copies.map((r,i)=>
    `<span class="mod-copy-chip ${r.replace('+','')}" title="Click to remove" onclick="modClearCopy(${mod.id},${i})">${r} ✕</span>`
  ).join('');
  const addCopyOpts=MOD_COPY_RARITIES.map(r=>`<option value="${r}">${r}</option>`).join('');
  const addCopyBtn=copies.length<5
    ?`<select class="mod-select" style="font-size:11px" onchange="modAddCopy(${mod.id},${copies.length},this.value);this.selectedIndex=0">
        <option value="" disabled selected>+ Add copy</option>${addCopyOpts}</select>`:'';

  return `<div class="mod-card${mod.owned?' owned':''}" style="border-top:3px solid ${color}">
    <div class="mod-card-header">
      <span class="mod-code" style="color:${color}">${mod.code}</span>
      <span class="mod-name">${mod.name}</span>
      ${equippedBadge}
      <label class="uw-toggle" style="margin-left:auto">
        <input type="checkbox" ${mod.owned?'checked':''} onchange="modSetOwned(${mod.id},this.checked)"> Owned
      </label>
    </div>
    <div class="mod-body">
      <div class="mod-effect">${mod.effectTemplate}</div>
      <div class="mod-ability-row">${abilityChips}</div>
      <div class="mod-controls">
        <span class="mod-label">Rarity</span>
        <select class="mod-select" onchange="modSaveState(${mod.id},${mod.owned},this.value,${mod.stars},${mod.level},'${mod.equippedSlot||''}')">
          ${rarityOpts}
        </select>
        ${mod.rarity==='Ancestral'?`<select class="mod-select" onchange="modSaveState(${mod.id},${mod.owned},'${mod.rarity}',parseInt(this.value),${mod.level},'${mod.equippedSlot||''}')">
          ${starsOpts}
        </select>`:''}
        <span class="mod-label">Lvl</span>
        <input class="mod-input" type="number" min="0" max="200" value="${mod.level}"
          onchange="modSaveState(${mod.id},${mod.owned},'${mod.rarity}',${mod.stars},parseInt(this.value),'${mod.equippedSlot||''}')">
      </div>
      <div class="mod-substats">
        <div class="mod-substats-title">Sub-stats</div>
        ${substatRows}
      </div>
      <div class="mod-copies">
        <div class="mod-copies-title">Merge Copies &nbsp;<span style="color:var(--muted);font-size:10px">(click to remove)</span></div>
        <div class="mod-copies-row">${copyChips}${addCopyBtn}</div>
      </div>
      <div class="mod-presets">
        <div class="mod-presets-title">Presets</div>
        <div class="mod-preset-chips">${renderPresetChips(mod,allMods)}</div>
      </div>
      <div class="mod-footer">
        <span>Shattered epics:
          <input class="mod-input" type="number" min="0" value="${mod.shatteredEpics}"
            style="width:48px;display:inline-block"
            onchange="modSetShattered(${mod.id},parseInt(this.value))">
        </span>
      </div>
    </div>
  </div>`;
}

function modScrollKey(){return 'mod-scroll';}
function saveModScroll(){sessionStorage.setItem(modScrollKey(),document.getElementById('mainContent').scrollTop);}
function restoreModScroll(){
  const top=parseInt(sessionStorage.getItem(modScrollKey())||'0',10);
  requestAnimationFrame(()=>document.getElementById('mainContent').scrollTop=top);
}
async function refreshModulesView(){await renderModulesView();restoreModScroll();}

async function modSaveState(id,owned,rarity,stars,level,equippedSlot){
  saveModScroll();
  await fetch(`${API}/modules/${id}/state`,{method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({owned,rarity,stars,level,equippedSlot:equippedSlot||null})});
  refreshModulesView();
}
async function modSetOwned(id,owned){
  saveModScroll();
  const mods=await(await fetch(`${API}/modules`)).json();
  const m=mods.find(x=>x.id===id);
  const level=owned&&m.level===0?1:m.level;
  await fetch(`${API}/modules/${id}/state`,{method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({owned,rarity:m.rarity,stars:m.stars,level,equippedSlot:m.equippedSlot||null})});
  refreshModulesView();
}
async function modSetSubstatKey(id,slot,key,rar,locked){
  saveModScroll();
  if(!key){await fetch(`${API}/modules/${id}/substat/${slot}`,{method:'DELETE'});refreshModulesView();return;}
  await fetch(`${API}/modules/${id}/substat/${slot}`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({key,rarity:rar,locked})});
  refreshModulesView();
}
async function modSetSubstatRarity(id,slot,key,rarity,locked){
  if(!key)return;
  saveModScroll();
  await fetch(`${API}/modules/${id}/substat/${slot}`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({key,rarity,locked})});
  refreshModulesView();
}
async function modToggleLock(id,slot,key,rarity,locked){
  if(!key)return;
  saveModScroll();
  await fetch(`${API}/modules/${id}/substat/${slot}`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({key,rarity,locked:!locked})});
  refreshModulesView();
}
async function modClearSubstat(id,slot){
  saveModScroll();
  await fetch(`${API}/modules/${id}/substat/${slot}`,{method:'DELETE'});
  refreshModulesView();
}
async function modAddCopy(id,copyIndex,rarity){
  saveModScroll();
  await fetch(`${API}/modules/${id}/copy/${copyIndex}`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({rarity})});
  refreshModulesView();
}
async function modClearCopy(id,copyIndex){
  saveModScroll();
  await fetch(`${API}/modules/${id}/copy/${copyIndex}`,{method:'DELETE'});
  refreshModulesView();
}
async function modTogglePreset(id,preset,slot,active){
  saveModScroll();
  if(active){
    await fetch(`${API}/modules/${id}/preset/${preset}/${slot}`,{method:'DELETE'});
  }else{
    await fetch(`${API}/modules/${id}/preset/${preset}/${slot}`,{method:'PUT'});
  }
  refreshModulesView();
}

async function modSetShattered(id,count){
  await fetch(`${API}/modules/${id}/shattered`,{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({count})});
}

init();
</script>
