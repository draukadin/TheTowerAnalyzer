<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tower Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  :root {
    --bg:#0d0f14; --surface:#141720; --surface2:#1c2030;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --text:#e8eaf0; --muted:#7a8099;
    --accent:#4f8ef7; --accent2:#7c5cfc;
    --gold:#f5c842; --green:#3dd68c; --red:#f26b6b; --orange:#f59e42;
    --font:'Segoe UI',system-ui,sans-serif;
    --mono:'Consolas','Courier New',monospace;
    --radius:10px; --radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;
    border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .logo-text{font-size:1.1rem;font-weight:700;letter-spacing:-0.5px;}
  .logo-text span{color:var(--accent);}
  .header-nav{display:flex;gap:6px;}
  .nav-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;
    color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
  .nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,0.08);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;}
  .status-dot.err{background:var(--red);}
  .layout{display:flex;height:calc(100vh - 57px);}
  .sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:12px 1rem;border-bottom:1px solid var(--border);display:flex;
    align-items:center;justify-content:space-between;}
  .sidebar-header h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .folder-filter{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;
    color:var(--text);font-size:12px;padding:4px 8px;font-family:var(--font);}
  .report-list{overflow-y:auto;flex:1;}
  .report-item{padding:11px 1rem;border-bottom:1px solid var(--border);cursor:pointer;
    transition:background 0.12s;display:flex;flex-direction:column;gap:3px;}
  .report-item:hover{background:var(--surface2);}
  .report-item.active{background:rgba(79,142,247,0.1);border-left:3px solid var(--accent);
    padding-left:calc(1rem - 3px);}
  .report-item-name{font-size:13px;font-weight:600;}
  .report-item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
  .tier-badge{background:rgba(79,142,247,0.15);color:var(--accent);padding:1px 6px;
    border-radius:4px;font-size:10px;font-weight:700;}
  .era-badge{background:rgba(124,92,252,0.15);color:var(--accent2);padding:1px 6px;
    border-radius:4px;font-size:10px;font-weight:600;max-width:120px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .wave-badge{color:var(--gold);}
  .loading-placeholder{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
  .main{flex:1;overflow-y:auto;padding:2rem;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--muted);gap:12px;text-align:center;}
  .empty-state .icon{font-size:48px;opacity:0.3;}
  .empty-state h2{font-size:1.2rem;color:var(--text);opacity:0.6;}
  .empty-state p{font-size:14px;max-width:320px;line-height:1.6;}
  .tab-bar{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .tab{padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .report-header{margin-bottom:1.5rem;}
  .report-title{font-size:1.4rem;font-weight:700;margin-bottom:6px;}
  .report-subtitle{color:var(--muted);font-size:13px;display:flex;gap:16px;flex-wrap:wrap;}
  .killed-by{display:inline-flex;align-items:center;background:rgba(242,107,107,0.12);
    color:var(--red);border:1px solid rgba(242,107,107,0.25);border-radius:6px;
    padding:3px 9px;font-size:12px;font-weight:600;}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin:1.75rem 0 0.875rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;}
  .stat-card .label{font-size:11px;color:var(--muted);margin-bottom:5px;}
  .stat-card .value{font-size:1.2rem;font-weight:700;font-family:var(--mono);}
  .stat-card .value.gold{color:var(--gold);}  .stat-card .value.green{color:var(--green);}
  .stat-card .value.accent{color:var(--accent);} .stat-card .value.red{color:var(--red);}
  .stat-card .value.orange{color:var(--orange);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .table-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .table-section table{width:100%;border-collapse:collapse;font-size:13px;}
  .table-section th{background:var(--surface2);padding:9px 13px;text-align:left;
    font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;}
  .table-section td{padding:9px 13px;border-top:1px solid var(--border);}
  .table-section tr:hover td{background:var(--surface2);}
  .val-num{font-family:var(--mono);color:var(--accent);font-weight:600;text-align:right;}
  .val-pct{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;}
  .bar-row{display:flex;align-items:center;}
  .bar-fill{height:5px;border-radius:3px;background:var(--accent);min-width:2px;}
  .bar-fill.gold{background:var(--gold);} .bar-fill.green{background:var(--green);}
  .bar-fill.orange{background:var(--orange);} .bar-fill.red{background:var(--red);}
  .diag-card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem;}
  .diag-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
  .diag-badge{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;}
  .diag-badge.HIGH{background:rgba(61,214,140,0.15);color:var(--green);border:1px solid rgba(61,214,140,0.3);}
  .diag-badge.MEDIUM{background:rgba(245,158,66,0.15);color:var(--orange);border:1px solid rgba(245,158,66,0.3);}
  .diag-badge.LOW{background:rgba(122,128,153,0.15);color:var(--muted);border:1px solid var(--border2);}
  .diag-title{font-size:1.1rem;font-weight:700;}
  .diag-explanation{font-size:13px;line-height:1.7;color:var(--muted);}
  .diag-metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:1rem;}
  .diag-metric{background:var(--surface2);border-radius:8px;padding:10px 12px;}
  .diag-metric .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .diag-metric .value{font-size:1rem;font-weight:700;font-family:var(--mono);color:var(--text);}
  .obs-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .obs-item{background:var(--surface2);border-radius:8px;padding:10px 14px;}
  .obs-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:3px;}
  .obs-detail{font-size:12px;color:var(--muted);line-height:1.6;}
  .lab-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem;}
  .lab-slot{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
  .lab-slot-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .lab-slot-max{font-size:1.3rem;font-weight:700;font-family:var(--mono);color:var(--green);margin-bottom:4px;}
  .lab-slot-max.none{color:var(--red);}
  .speed-row{display:flex;align-items:center;justify-content:space-between;
    font-size:11px;padding:3px 0;border-top:1px solid var(--border);}
  .speed-row .spd{font-weight:600;font-family:var(--mono);}
  .speed-row .cost{color:var(--muted);}
  .speed-row.affordable .spd{color:var(--green);}
  .speed-row.unaffordable .spd{color:var(--red);opacity:0.5;}
  .window-controls{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
  .window-controls label{font-size:13px;color:var(--muted);}
  .window-controls input[type=range]{accent-color:var(--accent);}
  .window-controls span{font-size:13px;font-weight:600;color:var(--accent);min-width:50px;}
  .trend-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);
    border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
  .trend-table th{background:var(--surface2);padding:9px 13px;text-align:left;
    font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
  .trend-table td{padding:9px 13px;border-top:1px solid var(--border);}
  .trend-table tr:hover td{background:var(--surface2);}
  .optimal-card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;}
  .optimal-slots{display:flex;gap:8px;flex-wrap:wrap;margin:0.75rem 0;}
  .optimal-slot-badge{background:rgba(61,214,140,0.12);color:var(--green);
    border:1px solid rgba(61,214,140,0.25);border-radius:6px;padding:4px 10px;
    font-size:13px;font-weight:700;font-family:var(--mono);}
  .optimal-slot-badge.none{background:rgba(122,128,153,0.1);color:var(--muted);border-color:var(--border2);}
  .compare-controls{display:flex;gap:10px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;}
  .compare-select{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    color:var(--text);font-size:13px;padding:7px 10px;font-family:var(--font);min-width:220px;}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);
    color:var(--text);font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-primary:hover{background:#3a7de8;color:#fff;}
  .delta-pos{color:var(--green);font-family:var(--mono);font-size:13px;}
  .delta-neg{color:var(--red);font-family:var(--mono);font-size:13px;}
  .delta-neu{color:var(--muted);font-family:var(--mono);font-size:13px;}
  .gemini-chat{margin-top:2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;}
  .gemini-chat-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .gemini-context-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
  .gemini-context-options{margin-bottom:1rem;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .gemini-context-option{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer;}
  .gemini-context-option input[type=checkbox]{accent-color:var(--accent);cursor:pointer;}
  .gemini-input-row{display:flex;gap:10px;align-items:flex-end;}
  .gemini-textarea{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    color:var(--text);font-size:13px;padding:10px 12px;font-family:var(--font);resize:vertical;
    min-height:72px;line-height:1.5;}
  .gemini-textarea:focus{outline:none;border-color:var(--accent);}
  .chat-thread{display:flex;flex-direction:column;gap:10px;margin-top:1rem;}
  .chat-turn{padding:11px 14px;border-radius:8px;font-size:13px;line-height:1.7;}
  .chat-turn.user{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);}
  .chat-turn.model{background:var(--surface2);border:1px solid var(--border);}
  .chat-turn.model p{margin:0 0 .6em;}
  .chat-turn.model p:last-child{margin-bottom:0;}
  .chat-turn.model ul,.chat-turn.model ol{padding-left:1.4em;margin:.4em 0;}
  .chat-turn.model li{margin:.2em 0;}
  .chat-turn.model h1,.chat-turn.model h2,.chat-turn.model h3{font-size:1em;font-weight:700;margin:.8em 0 .3em;color:var(--accent);}
  .chat-turn.model code{background:rgba(0,0,0,0.3);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:.9em;}
  .chat-turn.model pre{background:rgba(0,0,0,0.3);border-radius:6px;padding:.75em 1em;overflow-x:auto;margin:.5em 0;}
  .chat-turn.model pre code{background:none;padding:0;}
  .chat-turn.model strong{color:var(--text);font-weight:700;}
  .chat-turn.model hr{border:none;border-top:1px solid var(--border);margin:.8em 0;}
  .chat-turn-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:520px;max-width:92vw;max-height:82vh;overflow-y:auto;}
  .modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem;}
  .form-group{margin-bottom:1.25rem;}
  .form-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;display:block;}
  .form-input,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:9px 12px;font-family:var(--font);}
  .form-textarea{resize:vertical;min-height:80px;line-height:1.5;}
  .form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  .sidebar-actions{padding:8px 1rem;border-bottom:1px solid var(--border);}
  .btn-fetch{width:100%;padding:7px 12px;border-radius:7px;border:1px solid var(--border2);
    background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;
    transition:all 0.15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;}
  .btn-fetch:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .btn-fetch:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-fetch.loading{color:var(--muted);}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🗼</div>
    <div class="logo-text">The Tower <span>Analyzer</span></div>
  </div>
  <div class="header-nav">
    <button class="nav-btn active" onclick="showView('reports')">Reports</button>
    <button class="nav-btn" onclick="showView('cells')">Cell Income</button>
    <button class="nav-btn" onclick="showView('labspeed')">Lab Speed</button>
    <button class="nav-btn" onclick="openProfileModal()">&#9881; Profile</button>
  </div>
  <div style="font-size:12px;color:var(--muted)">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Battle Reports</h2>
      <select class="folder-filter" id="folderFilter" onchange="filterFolder(this.value)">
        <option value="">All folders</option>
      </select>
    </div>
    <div class="sidebar-actions">
      <button class="btn-fetch" id="fetchBtn" onclick="fetchReports()">&#8595; Fetch New Reports</button>
    </div>
    <div class="report-list" id="reportList">
      <div class="loading-placeholder">Loading reports…</div>
    </div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="icon">🗼</div>
      <h2>Select a report</h2>
      <p>Choose a battle report from the sidebar to see detailed stats, diagnosis, and comparisons.</p>
    </div>
  </main>
</div>
<script>
const API='http://localhost:8080/api';
let allReports=[],activeId=null,activePayload=null,activeView='reports',currentTab='stats';
let geminiCompareId1=null,geminiCompareId2=null,chatHistory=[];

async function init(){
  try{
    const res=await fetch(`${API}/reports`);
    if(!res.ok)throw new Error(res.statusText);
    allReports=await res.json();
    setStatus(true,`${allReports.length} reports loaded`);
    populateFolderFilter();
    renderSidebar(allReports);
  }catch(e){
    setStatus(false,'Cannot reach server');
    document.getElementById('reportList').innerHTML=
      '<div class="loading-placeholder" style="color:var(--red)">Server offline — is Spring Boot running on :8080?</div>';
  }
}

async function fetchReports(){
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;
  btn.classList.add('loading');
  btn.textContent='Fetching…';
  try{
    const res=await fetch(`${API}/reports/fetch`,{method:'POST'});
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    const n=data.processed;
    btn.textContent=n>0?`↓ Fetched ${n} report${n===1?'':'s'}`:'No new reports';
    if(n>0){
      const res2=await fetch(`${API}/reports`);
      allReports=await res2.json();
      populateFolderFilter();
      renderSidebar(visibleReports());
      setStatus(true,`${allReports.length} reports loaded`);
    }
  }catch(e){
    btn.textContent='Fetch failed';
    setStatus(false,'Fetch error');
  }finally{
    btn.disabled=false;
    btn.classList.remove('loading');
    setTimeout(()=>{btn.textContent='↓ Fetch New Reports';},3000);
  }
}

function setStatus(ok,msg){
  document.getElementById('statusDot').className='status-dot'+(ok?'':' err');
  document.getElementById('statusText').textContent=msg;
}

function populateFolderFilter(){
  const folders=[...new Set(allReports.map(r=>r.runType))].sort();
  const sel=document.getElementById('folderFilter');
  folders.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o);});
}

function filterFolder(folder){
  renderSidebar(folder?allReports.filter(r=>r.runType===folder):allReports);
}

function visibleReports(){
  const f=document.getElementById('folderFilter').value;
  return f?allReports.filter(r=>r.runType===f):allReports;
}

function renderSidebar(reports){
  const list=document.getElementById('reportList');
  list.innerHTML='';
  if(!reports.length){list.innerHTML='<div class="loading-placeholder">No reports found</div>';return;}
  reports.forEach(r=>{
    const item=document.createElement('div');
    item.className='report-item'+(r.id===activeId?' active':'');
    item.innerHTML=`
      <div class="report-item-name">T${r.tier}_Wave${r.wave.toLocaleString()}</div>
      <div class="report-item-meta">
        <span class="tier-badge">T${r.tier}</span>
        <span class="wave-badge">⚡ ${r.wave.toLocaleString()}</span>
        ${r.towerEra?`<span class="era-badge" title="${r.towerEra}">${r.towerEra}</span>`:''}
      </div>
      <div class="report-item-meta">
        <span>📅 ${r.battleDate}</span>
        <span style="color:var(--red);font-size:10px">💀 ${r.killedBy||'?'}</span>
      </div>`;
    item.addEventListener('click',()=>selectReport(r));
    list.appendChild(item);
  });
}

async function selectReport(summary){
  activeId=summary.id; currentTab='stats';
  renderSidebar(visibleReports());
  document.getElementById('mainContent').innerHTML=
    '<div class="loading-placeholder" style="padding:4rem;text-align:center">Loading…</div>';
  try{
    const res=await fetch(`${API}/reports/${encodeURIComponent(summary.id)}`);
    if(!res.ok)throw new Error(res.statusText);
    activePayload=await res.json();
    renderReportView(summary,activePayload);
  }catch(e){
    document.getElementById('mainContent').innerHTML=
      `<div class="empty-state"><div class="icon">⚠️</div><h2>Failed to load</h2><p>${e.message}</p></div>`;
  }
}

function showView(view){
  activeView=view;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['reports','cells','labspeed'][i]===view);
  });
  if(view==='cells')renderCellsView();
  else if(view==='labspeed')renderLabSpeedView();
  else if(activeId&&activePayload)renderReportView(allReports.find(r=>r.id===activeId),activePayload);
  else document.getElementById('mainContent').innerHTML=`
    <div class="empty-state"><div class="icon">🗼</div><h2>Select a report</h2>
    <p>Choose a battle report from the sidebar.</p></div>`;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const summary=allReports.find(r=>r.id===activeId);
  if(tab==='stats')renderStatsPanel(summary,activePayload);
  else if(tab==='diagnosis')renderDiagnosisPanel(summary);
  else if(tab==='compare')renderComparePanel(summary);
}

function renderReportView(summary,payload){

async function runComparison(id1){
  const id2=document.getElementById('compareSelect').value;
  if(!id2)return;
  geminiCompareId1=id1;geminiCompareId2=id2;chatHistory=[];
  document.getElementById('compareResult').innerHTML='<div class="loading-placeholder">Comparing…</div>';
  try{
    const res=await fetch(`${API}/reports/${encodeURIComponent(id1)}/comparison/${encodeURIComponent(id2)}`);
    const [r1,r2,delta]=await res.json();
    const lowerBetter=new Set(['DAMAGE_TAKEN.tower','DAMAGE_TAKEN.wall']);
    const sections=[
      ['BATTLE_REPORT',['tier','wave','coinsEarned','coinsPerHour','cellsEarned','cellsPerHour','killedBy','towerEra'],'Battle Report'],
      ['RECORDS',['highestCoinsPerMinute','largestWaveSkip','mostCoinsFromWaveSkip','largestSmartMissileStack','largestGoldenCombo'],'Records'],
      ['DAMAGE',['damageDealt','projectiles','orbs','chainLightning','thorns','landMines','smartMissiles','flameBot','blackHole','deathWave','deathRay'],'Damage'],
      ['DAMAGE_TAKEN',['tower','wall'],'Damage Taken'],
      ['DAMAGE_BLOCKED',['defensePercent','chronoField','chainThunder','flameBot','primordialCollapse'],'Damage Blocked'],
      ['HEALTH_REGENERATED',['lifeSteal','wallHealthRegen','towerHealthRegen'],'Health Regenerated'],
      ['COINS',['coinsEarned','goldenTower','blackHole','goldenBot','deathWave','spotlight'],'Coins'],
      ['CURRENCIES',['cellsEarned','gems','medals','reRollShardsEarned'],'Currencies'],
      ['ENEMIES_DESTROYED_BY',['orbs','chainLightning','landMines','projectiles','smartMissiles','flameBot'],'Enemies Destroyed By'],
    ];
    let html=`<div class="table-section"><table>
      <thead><tr><th>Field</th><th>${id1}</th><th>${id2}</th><th>Delta</th></tr></thead><tbody>`;
    sections.forEach(([sec,fields,title])=>{
      html+=`<tr><td colspan="4" style="background:var(--surface2);font-size:11px;text-transform:uppercase;
        letter-spacing:1px;color:var(--muted);padding:8px 13px">${title}</td></tr>`;
      const s1=(r1.sectionMap||{})[sec]||{};
      const s2=(r2.sectionMap||{})[sec]||{};
      const sd=(delta.sectionMap||{})[sec]||{};
      fields.forEach(f=>{
        const isLower=lowerBetter.has(`${sec}.${f}`);
        const dv=sd[f];
        const dRaw=typeof dv==='object'&&dv!==null?dv.raw:dv;
        const dStr=fmtField(dv);
        let dClass='delta-neu';
        if(dRaw&&dRaw!==0){const good=isLower?dRaw<0:dRaw>0;dClass=good?'delta-pos':'delta-neg';}
        html+=`<tr>
          <td style="color:var(--muted)">${camel(f)}</td>
          <td style="font-family:var(--mono);font-size:13px">${fmtField(s1[f])}</td>
          <td style="font-family:var(--mono);font-size:13px">${fmtField(s2[f])}</td>
          <td class="${dClass}">${dStr}</td>
        </tr>`;
      });
    });
    html+='</tbody></table></div><div style="height:2rem"></div>';
    document.getElementById('compareResult').innerHTML=html;
    const chat=document.getElementById('geminiChat');
    chat.style.display='block';
    document.getElementById('geminiThread').innerHTML='';
    await loadChatHistory(id1,id2);
  }catch(e){
    document.getElementById('compareResult').innerHTML=`<div style="color:var(--red);padding:1rem">${e.message}</div>`;
  }
}

  if(document.getElementById('geminiCtxRelics').checked)contextTypes.push('relics');
  const sendBtn=document.getElementById('geminiSendBtn');
  sendBtn.disabled=true;
  const thread=document.getElementById('geminiThread');
  thread.insertAdjacentHTML('beforeend',
    `<div class="chat-turn user"><div class="chat-turn-label">You</div>${escHtml(prompt)}</div>
     <div id="geminiLoading" class="loading-placeholder" style="padding:8px 0;text-align:left">Thinking…</div>`);
  document.getElementById('geminiPrompt').value='';
  thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  try{
    const res=await fetch(`${API}/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt,contextTypes,reportId1:geminiCompareId1,reportId2:geminiCompareId2,history:chatHistory})
    });
    if(!res.ok)throw new Error(await res.text());
    const{reply}=await res.json();
    chatHistory.push({role:'user',text:prompt});
    chatHistory.push({role:'model',text:reply});
    document.getElementById('geminiLoading').remove();
    thread.insertAdjacentHTML('beforeend',
      `<div class="chat-turn model"><div class="chat-turn-label">Gemini</div>${renderMarkdown(reply)}</div>`);
    thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){
    document.getElementById('geminiLoading').remove();
    thread.insertAdjacentHTML('beforeend',
      `<div style="color:var(--red);padding:8px 0;font-size:13px">${escHtml(e.message)}</div>`);
  }finally{
    sendBtn.disabled=false;
  }
}

async function loadChatHistory(id1,id2){
  try{
    const res=await fetch(`${API}/chat/history?reportId1=${encodeURIComponent(id1)}&reportId2=${encodeURIComponent(id2)}`);
    if(!res.ok)return;
    const history=await res.json();
    chatHistory=history.map(t=>({role:t.role,text:t.text}));
    const thread=document.getElementById('geminiThread');
    for(const turn of history){
      const label=turn.role==='user'?'You':'Gemini';
      const cls=turn.role==='user'?'user':'model';
      thread.insertAdjacentHTML('beforeend',
        `<div class="chat-turn ${cls}"><div class="chat-turn-label">${label}</div>${cls==='model'?renderMarkdown(turn.text):escHtml(turn.text)}</div>`);
    }
    if(history.length>0)thread.lastElementChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  }catch(e){/* silently ignore */}
}

async function clearChatHistory(){
  if(!geminiCompareId1||!geminiCompareId2)return;
  try{
    await fetch(`${API}/chat/history?reportId1=${encodeURIComponent(geminiCompareId1)}&reportId2=${encodeURIComponent(geminiCompareId2)}`,{method:'DELETE'});
    chatHistory=[];
    document.getElementById('geminiThread').innerHTML='';
  }catch(e){/* silently ignore */}
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(s){

}

async function loadLabSpeed(days){

    const opt=d.optimalCombination;
    const farm=d.farmingCombination;
    const dt=d.deadTimeStats;
    const cr=d.cellReserve;
    const fmtHrs=h=>{if(h==null||h<0)return '—';if(h<1)return Math.round(h*60)+'m';if(h<24)return h.toFixed(1)+'h';return (h/24).toFixed(1)+'d';};
    document.getElementById('labPanel').innerHTML=`
      <div class="stat-grid" style="margin-bottom:1rem">
        <div class="stat-card"><div class="label">Runs Analyzed</div><div class="value accent">${d.runsAnalyzed}</div></div>
        <div class="stat-card"><div class="label">Farming CPH</div><div class="value green">${fmtRaw(d.averageCellsPerHour)}</div></div>
        <div class="stat-card"><div class="label">Effective CPH</div><div class="value ${d.effectiveCellsPerHour>=d.averageCellsPerHour*0.9?'green':'gold'}">${fmtRaw(d.effectiveCellsPerHour)}</div></div>
        <div class="stat-card"><div class="label">Net Cells/Hour</div><div class="value ${opt.netCellsPerHour>=0?'green':'red'}">${fmtRaw(opt.netCellsPerHour)}</div></div>
      </div>
      <div class="optimal-card" style="margin-bottom:1rem">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Dead Time · ${fmtHrs(dt.hoursSinceLastRun)} since last run</div>
        <div style="display:flex;gap:2rem;flex-wrap:wrap;font-size:13px;margin-bottom:8px">
          <span>Active: <b style="color:var(--text);font-family:var(--mono)">${fmtHrs(dt.totalActiveHours)}</b></span>
          <span>Dead: <b style="color:${dt.deadTimePercent>50?'var(--red)':'var(--muted)'};font-family:var(--mono)">${fmtHrs(dt.totalDeadHours)}</b></span>
          <span>Calendar: <b style="color:var(--text);font-family:var(--mono)">${fmtHrs(dt.totalCalendarHours)}</b></span>
          <span>Dead %: <b style="color:${dt.deadTimePercent>50?'var(--red)':'var(--muted)'};font-family:var(--mono)">${dt.deadTimePercent.toFixed(1)}%</b></span>
        </div>
        <div style="font-size:11px;color:var(--muted)">Effective CPH = cells earned ÷ calendar time (farming + idle). Affordability uses Effective CPH.</div>
      </div>
      <div class="optimal-card">
        <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Optimal Combination</div>
        <div class="optimal-slots">${opt.slots.map((s,i)=>`
          <div>

        </div>
        <div style="font-size:13px;color:var(--muted);margin-top:8px">
          Total cost: <span style="color:var(--text);font-family:var(--mono)">${fmtRaw(opt.totalCostPerHour)}/hr</span> ·
          <span style="color:var(--text);font-family:var(--mono)">${fmtRaw(opt.totalCostPerDay)}/day</span> ·
          Net: <span style="color:${opt.netCellsPerHour>=0?'var(--green)':'var(--red)'};font-family:var(--mono)">${fmtRaw(opt.netCellsPerHour)}/hr</span>
        </div>

          <div style="font-size:10px;color:var(--muted);margin-bottom:6px">max affordable</div>
          ${slot.options.map(o=>`
            <div class="speed-row ${o.affordable?'affordable':'unaffordable'}">

            </div>`).join('')}
        </div>`).join('')}
      </div>
      <div style="height:2rem"></div>`;
  }catch(e){
    document.getElementById('labPanel').innerHTML=`<div style="color:var(--red);padding:1rem">${e.message}</div>`;
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function raw(v){if(v==null)return 0;if(typeof v==='object'&&'raw'in v)return v.raw;return Number(v)||0;}
function disp(v){if(v==null)return '0';if(typeof v==='object'&&'display'in v)return v.display;return String(v);}
function fmtField(v){
  if(v==null)return '—';
  if(typeof v==='object'&&'display'in v)return v.display;
  if(typeof v==='number')return v.toLocaleString();
  return String(v);
}
function fmtRaw(n){
  if(n==null||n===''||isNaN(n))return '0';
  n=Number(n);
  const a=Math.abs(n);
  if(a>=1e33)return(n/1e33).toFixed(2)+'d'; if(a>=1e30)return(n/1e30).toFixed(2)+'N';
  if(a>=1e27)return(n/1e27).toFixed(2)+'O'; if(a>=1e24)return(n/1e24).toFixed(2)+'S';
  if(a>=1e21)return(n/1e21).toFixed(2)+'s'; if(a>=1e18)return(n/1e18).toFixed(2)+'Q';
  if(a>=1e15)return(n/1e15).toFixed(2)+'q'; if(a>=1e12)return(n/1e12).toFixed(2)+'T';
  if(a>=1e9)return(n/1e9).toFixed(2)+'B';   if(a>=1e6)return(n/1e6).toFixed(2)+'M';
  if(a>=1e3)return(n/1e3).toFixed(2)+'K';
  return Number.isInteger(n)?n.toString():n.toFixed(2);
}
function fmtDuration(s){
  if(!s)return '0s';
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>0)return`${d}d ${h}h ${m}m`;
  if(h>0)return`${h}h ${m}m`;
  return`${m}m ${sec}s`;
}
function fmtPct(v){return v!=null?(v*100).toFixed(1)+'%':'—';}
function pct(v,total){return total?Math.round((v/total)*100):0;}
function camel(s){return s.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase());}

init();
