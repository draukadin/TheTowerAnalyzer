<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#eef0f7"/>

  <!-- Bar chart (left side, decorative) -->
  <rect x="52" y="378" width="38" height="56" rx="6" fill="#d2d8e8"/>
  <rect x="100" y="344" width="38" height="90" rx="6" fill="#b8bfd4"/>

  <!-- Tower body -->
  <rect x="152" y="272" width="208" height="212" rx="12" fill="#2e3a5c"/>

  <!-- Battlements: left fixed at x=148, rightmost right edge ~364 (2px overhang each side)
       4 merlons width=44, span 148 to 364, gaps: (364-148-4*44)/3 = (216-176)/3 = ~13.3
       Positions: 148, 205, 263, 320 -->
  <rect x="148" y="236" width="44" height="50" rx="8" fill="#2e3a5c"/>
  <rect x="206" y="236" width="44" height="50" rx="8" fill="#2e3a5c"/>
  <rect x="264" y="236" width="44" height="50" rx="8" fill="#2e3a5c"/>
  <rect x="320" y="236" width="44" height="50" rx="8" fill="#2e3a5c"/>

  <!-- Gate arch -->
  <path d="M220 484 L220 420 Q256 376 292 420 L292 484" fill="#eef0f7"/>

  <!-- Windows -->
  <rect x="168" y="308" width="44" height="48" rx="8" fill="#ffb830"/>
  <rect x="300" y="308" width="44" height="48" rx="8" fill="#ffb830"/>

  <!-- Magnifying glass -->
  <circle cx="390" cy="122" r="72" fill="none" stroke="#4e6ef5" stroke-width="28" stroke-linecap="round"/>
  <line x1="441" y1="175" x2="490" y2="224" stroke="#4e6ef5" stroke-width="28" stroke-linecap="round"/>

  <!-- Trend line inside magnifier -->
  <polyline points="348,140 368,112 392,124 418,88" fill="none" stroke="#4e6ef5" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
