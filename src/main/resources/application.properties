# Sheet IDs are loaded from %APPDATA%\TheTowerAnalyzer\sheets.properties so they
# can be changed without recompiling.  See that file for the keys to override.
spring.config.import=file:${APPDATA}/TheTowerAnalyzer/user.properties

tower.cells.window-days-default=30
tower.cells.window-days-min=3
tower.cells.window-days-max=90

spring.datasource.url=jdbc:sqlite:${APPDATA}/TheTowerAnalyzer/analyzer.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL

server.port=8080

spring.cache.type=simple

aws.region=us-east-1
aws.dynamodb-table=TowerAnalyzerPlayerVersion-prod
aws.s3-bucket=tower-analyzer-reports-prod-611434859239
aws.api-gateway.url.us=https://u4qu1kwqt8.execute-api.us-east-2.amazonaws.com/prod