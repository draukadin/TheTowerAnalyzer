# Sheet IDs are loaded from %APPDATA%\TheTowerAnalyzer\sheets.properties so they
# can be changed without recompiling.  See that file for the keys to override.
# Gemini prompts and settings are loaded from %APPDATA%\TheTowerAnalyzer\gemini.properties.
spring.config.import=optional:file:${APPDATA}/TheTowerAnalyzer/sheets.properties,\
  optional:file:${APPDATA}/TheTowerAnalyzer/gemini.properties,\
  optional:file:${APPDATA}/TheTowerAnalyzer/claude.properties

gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# Default active prompt key.  Override in %APPDATA%\TheTowerAnalyzer\gemini.properties.
gemini.active-prompt=analyst

# Built-in prompt definitions.  Add more or override in gemini.properties.
gemini.prompts.analyst=You are an expert analyst for The Tower: Tower Defense Game. \
  You help players understand their battle statistics, compare run performance, \
  and provide actionable advice to improve their gameplay. \
  Be concise, specific, and refer to the provided data when relevant.

claude.api-key=${CLAUDE_API_KEY:}
claude.model=claude-sonnet-4-6

# Default active prompt key. Override in %APPDATA%\TheTowerAnalyzer\claude.properties.
claude.active-prompt=analyst

# Built-in prompt definitions. Add more or override in claude.properties.
claude.prompts.analyst=You are an expert analyst for The Tower: Tower Defense Game. \
  You help players understand their battle statistics, compare run performance, \
  and provide actionable advice to improve their gameplay. \
  Be concise, specific, and refer to the provided data when relevant.

tower.cells.window-days-default=30
tower.cells.window-days-min=3
tower.cells.window-days-max=90

spring.datasource.url=jdbc:sqlite:${APPDATA}/TheTowerAnalyzer/analyzer.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL

server.port=8080

spring.cache.type=simple

drive.credentials-file=${APPDATA}/TheTowerAnalyzer/credentials.json
drive.oauth-credentials-file=${APPDATA}/TheTowerAnalyzer/oauth-credentials.json
drive.tokens-dir=${APPDATA}/TheTowerAnalyzer/tokens
drive.application-name=TowerAnalyzer
drive.backup-folder-id=1QhkCWYMwg2WH_-DW23xVHJ1_3aQKOwbq
