# Disable the hard import of user.properties (does not exist in build environment)
spring.config.import=

# Write the factory database to target/ — copied to src/main/resources/analyzer.db by the generate-factory-db profile
spring.datasource.url=jdbc:sqlite:target/factory.db

# No web server — Spring Boot exits cleanly after all ApplicationRunners complete
spring.main.web-application-type=none

spring.cache.type=none

# Stub drive properties so ReportFetcherService does not throw on blank folderId
drive.battle-reports-folder-id=seed
drive.application-name=seed

# Stub cell-income window so AppConfig binding does not fail
tower.cells.window-days-default=30
tower.cells.window-days-min=3
tower.cells.window-days-max=90

# Blank out AWS props so AwsProperties.isConfigured() returns false
aws.region=
aws.s3-bucket=
aws.player-id=
aws.api-gateway.region=us
